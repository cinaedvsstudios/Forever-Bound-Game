<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifex Radial Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-purple: #c300ff;
            --neon-purple-dim: rgba(195, 0, 255, 0.4);
            --blue-purple: #5d00ff;
            --blue-purple-dim: rgba(93, 0, 255, 0.4);
            --bg-dark: #070707;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        .ambient-background {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('menu/menubackground.jpg');
            background-size: cover;
            background-position: center bottom;
            z-index: 1;
        }

        #fx-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .top-ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 18px;
            pointer-events: auto;
        }

        .brand-crest {
            width: 70px;
            height: auto;
            border: none;
            filter: drop-shadow(0 0 15px var(--blue-purple));
            object-fit: contain;
        }

        .brand-title {
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px var(--blue-purple));
        }

        .audio-toggle-btn {
            background: rgba(10, 11, 10, 0.85);
            border: 1px solid #896b49;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            box-shadow: 0 0 20px var(--blue-purple-dim);
            animation: breatheAudio 3s infinite alternate;
        }

        .audio-toggle-btn:hover {
            box-shadow: 0 0 30px var(--blue-purple);
            transform: scale(1.1);
        }

        @keyframes breatheAudio {
            0% { box-shadow: 0 0 10px var(--blue-purple-dim); }
            100% { box-shadow: 0 0 25px var(--blue-purple); }
        }

        .dial-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1/1;
            z-index: 10;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));
        }

        svg {
            width: 100%; height: 100%;
            overflow: visible;
        }

        .wedge-group {
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .wedge-glow {
            fill: var(--neon-purple);
            opacity: 0;
            filter: drop-shadow(0 0 25px var(--neon-purple));
            transition: opacity 0.3s;
        }

        .icon-carved {
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        
        .icon-glow {
            mix-blend-mode: screen;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .wedge-group:hover .wedge-glow {
            opacity: 0.85; 
            animation: pulseWedge 1s infinite alternate;
        }
        .wedge-group:hover .icon-carved { opacity: 0; }
        .wedge-group:hover .icon-glow { opacity: 1; }

        .wedge-group:hover#w1 { transform: translate(0px, -18px); }
        .wedge-group:hover#w2 { transform: translate(16px, -9px); }
        .wedge-group:hover#w3 { transform: translate(16px, 9px); }
        .wedge-group:hover#w4 { transform: translate(0px, 18px); }
        .wedge-group:hover#w5 { transform: translate(-16px, 9px); }
        .wedge-group:hover#w6 { transform: translate(-16px, -9px); }

        @keyframes pulseWedge {
            0% { filter: drop-shadow(0 0 15px var(--neon-purple)); opacity: 0.7; }
            100% { filter: drop-shadow(0 0 35px var(--neon-purple)); opacity: 1; }
        }

        .center-cap-base {
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9));
        }

        .soft-glow-circle {
            opacity: 0;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
        }
        .soft-glow-circle.ignite {
            opacity: 0.85; 
            animation: pulseWedge 1s infinite alternate;
        }

        .center-glow-overlay {
            mix-blend-mode: screen;
            opacity: 0;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
        }
        .center-glow-overlay.ignite {
            opacity: 1;
            animation: pulseWedge 1s infinite alternate;
        }

        .portal-panel-backdrop {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: radial-gradient(circle at center, rgba(93, 0, 255, 0.18), rgba(0, 0, 0, 0.68));
            backdrop-filter: blur(4px);
        }

        .portal-panel-backdrop.is-open {
            display: flex;
        }

        .portal-panel {
            width: min(560px, calc(100vw - 48px));
            color: #f7dfbd;
            background: linear-gradient(180deg, rgba(46, 22, 12, 0.96), rgba(9, 5, 8, 0.96));
            border: 1px solid #a86c36;
            border-radius: 22px;
            box-shadow: 0 0 30px rgba(195, 0, 255, 0.32), inset 0 0 18px rgba(255, 180, 91, 0.08);
            padding: 26px;
            position: relative;
            text-align: left;
        }

        .portal-panel h2 {
            margin: 0 48px 12px 0;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.08em;
            color: #ffd39b;
            text-shadow: 0 0 12px rgba(195, 0, 255, 0.5);
        }

        .portal-panel p {
            margin: 0 0 12px;
            line-height: 1.55;
            color: #f4dfc4;
        }

        .portal-panel .portal-status {
            display: inline-flex;
            margin-bottom: 14px;
            padding: 5px 10px;
            border: 1px solid rgba(195, 0, 255, 0.55);
            border-radius: 999px;
            color: #f0c7ff;
            background: rgba(195, 0, 255, 0.12);
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .portal-panel-close {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #a86c36;
            background: rgba(12, 5, 8, 0.84);
            color: #ffd39b;
            cursor: pointer;
            font-size: 20px;
        }

        .portal-panel-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .portal-panel-action {
            border: 1px solid #a86c36;
            border-radius: 999px;
            padding: 9px 14px;
            background: linear-gradient(180deg, rgba(70, 22, 100, 0.95), rgba(29, 9, 43, 0.95));
            color: #fff2cf;
            cursor: pointer;
            text-decoration: none;
            font: inherit;
        }

        .portal-panel-action:hover,
        .portal-panel-close:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 16px var(--neon-purple-dim);
        }

        @media (max-width: 760px) {
            .top-ui-layer { padding: 18px; }
            .brand-crest { width: 48px; }
            .brand-title { height: 28px; }
            .audio-toggle-btn { width: 44px; height: 44px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="ambient-background"></div>
    <canvas id="fx-canvas"></canvas>

    <div class="dial-container">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <defs>
                <pattern id="copper-plate" width="1000" height="1000" patternUnits="userSpaceOnUse">
                    <image href="menu/menudial.png" xlink:href="menu/menudial.png" width="1000" height="1000" />
                </pattern>
                
                <pattern id="center-patina" width="300" height="300" patternUnits="userSpaceOnUse" x="350" y="350">
                    <image href="menu/artifexlogo.png" xlink:href="menu/artifexlogo.png" width="300" height="300" preserveAspectRatio="xMidYMid slice" />
                </pattern>

                <filter id="wide-glow" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur stdDeviation="40" result="blur" />
                </filter>
            </defs>

            <g class="wedge-group" id="w1" data-module="about" tabindex="0" role="button" aria-label="About Artifex">
                <path class="wedge-glow" d="M 500 500 L 250 67 A 500 500 0 0 1 750 67 Z" />
                <path class="wedge-plate" d="M 500 500 L 250 67 A 500 500 0 0 1 750 67 Z" fill="url(#copper-plate)" />
                <image class="icon-carved" href="menu/about0.png" xlink:href="menu/about0.png" x="387.5" y="77.5" width="225" height="225" />
                <image class="icon-glow" href="menu/about1.png" xlink:href="menu/about1.png" x="387.5" y="77.5" width="225" height="225" />
            </g>

            <g class="wedge-group" id="w2" data-module="help" tabindex="0" role="button" aria-label="Help and guides">
                <path class="wedge-glow" d="M 500 500 L 750 67 A 500 500 0 0 1 1000 500 Z" />
                <path class="wedge-plate" d="M 500 500 L 750 67 A 500 500 0 0 1 1000 500 Z" fill="url(#copper-plate)" />
                <image class="icon-carved" href="menu/help.png" xlink:href="menu/help.png" x="667.5" y="237.5" width="225" height="225" />
                <image class="icon-glow" href="menu/help1.png" xlink:href="menu/help1.png" x="667.5" y="237.5" width="225" height="225" />
            </g>

            <g class="wedge-group" id="w3" data-module="cinaedvs" tabindex="0" role="button" aria-label="Cinaedvs Studios">
                <path class="wedge-glow" d="M 500 500 L 1000 500 A 500 500 0 0 1 750 933 Z" />
                <path class="wedge-plate" d="M 500 500 L 1000 500 A 500 500 0 0 1 750 933 Z" fill="url(#copper-plate)" />
                <image class="icon-carved" href="menu/cinaedvs.png" xlink:href="menu/cinaedvs.png" x="667.5" y="537.5" width="225" height="225" />
                <image class="icon-glow" href="menu/cinaedvs1.png" xlink:href="menu/cinaedvs1.png" x="667.5" y="537.5" width="225" height="225" />
            </g>

            <g class="wedge-group" id="w4" data-module="settings" tabindex="0" role="button" aria-label="Artifex settings">
                <path class="wedge-glow" d="M 500 500 L 750 933 A 500 500 0 0 1 250 933 Z" />
                <path class="wedge-plate" d="M 500 500 L 750 933 A 500 500 0 0 1 250 933 Z" fill="url(#copper-plate)" />
                <image class="icon-carved" href="menu/settings.png" xlink:href="menu/settings.png" x="387.5" y="697.5" width="225" height="225" />
                <image class="icon-glow" href="menu/settings1.png" xlink:href="menu/settings1.png" x="387.5" y="697.5" width="225" height="225" />
            </g>

            <g class="wedge-group" id="w5" data-module="font" tabindex="0" role="button" aria-label="Font Packer">
                <path class="wedge-glow" d="M 500 500 L 250 933 A 500 500 0 0 1 0 500 Z" />
                <path class="wedge-plate" d="M 500 500 L 250 933 A 500 500 0 0 1 0 500 Z" fill="url(#copper-plate)" />
                <image class="icon-carved" href="menu/font.png" xlink:href="menu/font.png" x="107.5" y="537.5" width="225" height="225" />
                <image class="icon-glow" href="menu/font1.png" xlink:href="menu/font1.png" x="107.5" y="537.5" width="225" height="225" />
            </g>

            <g class="wedge-group" id="w6" data-module="scene" tabindex="0" role="button" aria-label="Scene Editor">
                <path class="wedge-glow" d="M 500 500 L 0 500 A 500 500 0 0 1 250 67 Z" />
                <path class="wedge-plate" d="M 500 500 L 0 500 A 500 500 0 0 1 250 67 Z" fill="url(#copper-plate)" />
                <image class="icon-carved" href="menu/scene.png" xlink:href="menu/scene.png" x="107.5" y="237.5" width="225" height="225" />
                <image class="icon-glow" href="menu/scene1.png" xlink:href="menu/scene1.png" x="107.5" y="237.5" width="225" height="225" />
            </g>

            <g id="center-hub">
                <circle cx="500" cy="500" r="160" fill="var(--neon-purple)" filter="url(#wide-glow)" class="soft-glow-circle" id="master-diffuse-glow" />
                <circle cx="500" cy="500" r="145" class="center-cap-base" fill="url(#center-patina)" stroke="#896b49" stroke-width="3" />
                <image id="master-core-lightning" class="center-glow-overlay" href="menu/menudialglow.png" xlink:href="menu/menudialglow.png" x="350" y="350" width="300" height="300" />
            </g>
        </svg>
    </div>

    <div class="top-ui-layer">
        <div class="brand-container">
            <img class="brand-crest" src="artifexlogo.png" alt="Logo">
            <img class="brand-title" src="artifextitle.png" alt="Artifex">
        </div>
        
        <div class="audio-toggle-btn" id="audio-btn" onclick="toggleAudio()" title="Mute Tactical Audio">🔊</div>
    </div>

    <div class="portal-panel-backdrop" id="portal-panel-backdrop" aria-hidden="true">
        <section class="portal-panel" role="dialog" aria-modal="true" aria-labelledby="portal-panel-title">
            <button class="portal-panel-close" id="portal-panel-close" type="button" aria-label="Close panel">×</button>
            <span class="portal-status" id="portal-panel-status">Module</span>
            <h2 id="portal-panel-title">Artifex</h2>
            <p id="portal-panel-copy">Select a tool from the radial menu.</p>
            <div class="portal-panel-actions" id="portal-panel-actions"></div>
        </section>
    </div>

    <script>
        let audioEnabled = true;
        let audioCtx = null;
        let audioUnlocked = false; 

        const portalModules = {
            about: {
                title: 'About Artifex',
                status: 'Portal Module',
                copy: 'Artifex is the creator hub for Forever Bound: a standalone workspace for scene editing, asset preparation, JSON tools, and future mini-apps.',
                actions: [{ label: 'Return to Portal', type: 'close' }]
            },
            help: {
                title: 'Help / Guides',
                status: 'Placeholder',
                copy: 'Guides will live here once the Scene Editor, templates, and export workflow are wired into the new Artifex hub.',
                actions: [{ label: 'Return to Portal', type: 'close' }]
            },
            cinaedvs: {
                title: 'Cinaedvs Studios',
                status: 'External Link',
                copy: 'Opening the Cinaedvs Studios site in a new tab.',
                directUrl: 'https://cinaedvsstudios.github.io/cinaedvs/',
                target: '_blank',
                actions: [{ label: 'Open Cinaedvs Studios', href: 'https://cinaedvsstudios.github.io/cinaedvs/', target: '_blank' }]
            },
            settings: {
                title: 'Artifex Settings',
                status: 'Placeholder',
                copy: 'Settings will eventually control Artifex appearance, paths, default folders, audio preferences, and editor behaviour.',
                actions: [{ label: 'Return to Portal', type: 'close' }]
            },
            font: {
                title: 'Font Packer',
                status: 'Future Tool',
                copy: 'This will become the bitmap font / atlas tool. For now it is wired as a placeholder so the portal has a complete action map.',
                actions: [{ label: 'Return to Portal', type: 'close' }]
            },
            scene: {
                title: 'Scene Editor',
                status: 'Available',
                copy: 'Opening the standalone Artifex Scene Editor.',
                directUrl: 'apps/scene-editor/',
                actions: [{ label: 'Open Scene Editor', href: 'apps/scene-editor/' }]
            }
        };

        document.body.addEventListener('click', () => {
            if (!audioUnlocked && audioEnabled) {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                audioUnlocked = true;
            }
        });

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            const btn = document.getElementById('audio-btn');
            btn.innerHTML = audioEnabled ? '🔊' : '🔇';
            btn.style.boxShadow = audioEnabled ? '' : 'none';
            btn.style.animation = audioEnabled ? 'breatheAudio 3s infinite alternate' : 'none';
            if (audioEnabled) {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                audioUnlocked = true;
                playTone('surge');
            }
        }

        function initAudio() {
            if (!audioCtx && audioEnabled) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(type) {
            if (!audioEnabled || !audioUnlocked || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'hover') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(60, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'surge') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        function openPortalPanel(moduleId) {
            const module = portalModules[moduleId];
            if (!module) return;
            const backdrop = document.getElementById('portal-panel-backdrop');
            const status = document.getElementById('portal-panel-status');
            const title = document.getElementById('portal-panel-title');
            const copy = document.getElementById('portal-panel-copy');
            const actions = document.getElementById('portal-panel-actions');
            status.textContent = module.status;
            title.textContent = module.title;
            copy.textContent = module.copy;
            actions.innerHTML = '';
            (module.actions || []).forEach(action => {
                const control = action.href ? document.createElement('a') : document.createElement('button');
                control.className = 'portal-panel-action';
                control.textContent = action.label;
                if (action.href) {
                    control.href = action.href;
                    if (action.target) control.target = action.target;
                    if (action.target === '_blank') control.rel = 'noopener noreferrer';
                } else {
                    control.type = 'button';
                    control.addEventListener('click', closePortalPanel);
                }
                actions.appendChild(control);
            });
            backdrop.classList.add('is-open');
            backdrop.setAttribute('aria-hidden', 'false');
            document.getElementById('portal-panel-close').focus();
        }

        function closePortalPanel() {
            const backdrop = document.getElementById('portal-panel-backdrop');
            backdrop.classList.remove('is-open');
            backdrop.setAttribute('aria-hidden', 'true');
        }

        function activateModule(moduleId) {
            const module = portalModules[moduleId];
            if (!module) return;
            if (module.directUrl) {
                if (module.target === '_blank') {
                    window.open(module.directUrl, '_blank', 'noopener,noreferrer');
                } else {
                    window.location.href = module.directUrl;
                }
                return;
            }
            openPortalPanel(moduleId);
        }

        document.getElementById('portal-panel-close').addEventListener('click', closePortalPanel);
        document.getElementById('portal-panel-backdrop').addEventListener('click', (event) => {
            if (event.target.id === 'portal-panel-backdrop') closePortalPanel();
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closePortalPanel();
        });

        const wedges = document.querySelectorAll('.wedge-group');
        const centralDiffuseGlow = document.getElementById('master-diffuse-glow');
        const centerLightning = document.getElementById('master-core-lightning');

        wedges.forEach(wedge => {
            wedge.addEventListener('mouseenter', () => {
                const standardGlow = wedge.querySelector('.wedge-glow');
                if (standardGlow) standardGlow.style.opacity = '0.75';
                centralDiffuseGlow.classList.add('ignite');
                centerLightning.classList.add('ignite');
                playTone('hover');
            });
            wedge.addEventListener('mouseleave', () => {
                const standardGlow = wedge.querySelector('.wedge-glow');
                if (standardGlow) standardGlow.style.opacity = '0';
                setTimeout(() => {
                    if(!document.querySelector('.wedge-group:hover')) {
                        centralDiffuseGlow.classList.remove('ignite');
                        centerLightning.classList.remove('ignite');
                    }
                }, 50);
            });
            wedge.addEventListener('click', () => {
                playTone('surge');
                activateModule(wedge.dataset.module);
            });
            wedge.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    playTone('surge');
                    activateModule(wedge.dataset.module);
                }
            });
        });

        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(type) {
                this.type = type; 
                this.reset(true);
            }

            reset(initial = false) {
                if (this.type === 'mist') {
                    this.x = initial ? Math.random() * width : -150;
                    this.y = (height * 0.4) + (Math.random() * height * 0.6); 
                    this.size = Math.random() * 150 + 100;
                    this.speedX = Math.random() * 1.5 + 0.8; 
                    this.speedY = (Math.random() - 0.5) * 0.1;
                    this.opacity = Math.random() * 0.15 + 0.05;
                } else if (this.type === 'fire') {
                    const side = Math.random() > 0.5 ? (width * 0.15) : (width * 0.85);
                    this.x = side + (Math.random() * 150 - 75);
                    this.y = height + (Math.random() * 50); 
                    this.size = Math.random() * 2.5 + 0.5; 
                    this.speedX = (Math.random() - 0.5) * 1.5;
                    this.speedY = Math.random() * -2.5 - 1; 
                    this.life = 0;
                    this.maxLife = Math.random() * 150 + 100; 
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.type === 'mist') {
                    if (this.x > width + 200) this.reset();
                } else if (this.type === 'fire') {
                    this.x += Math.sin(this.life * 0.05) * 1.0; 
                    this.life++;
                    if (this.life > this.maxLife || this.y < -50) this.reset();
                }
            }

            draw() {
                if (this.type === 'mist') {
                    ctx.globalCompositeOperation = 'screen';
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                    gradient.addColorStop(0, `rgba(200, 210, 230, ${this.opacity})`);
                    gradient.addColorStop(1, 'rgba(200, 210, 230, 0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'fire') {
                    ctx.globalCompositeOperation = 'lighter';
                    const progress = this.life / this.maxLife;
                    const r = 255;
                    const g = 255 - (progress * 255);
                    const b = 50 - (progress * 50);
                    const a = 1 - progress;
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                    gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${a})`);
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        for (let i = 0; i < 40; i++) particles.push(new Particle('mist'));
        for (let i = 0; i < 100; i++) particles.push(new Particle('fire')); 

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            const flicker = Math.sin(Date.now() * 0.005) * 0.05 + 0.15;
            const floorGrad = ctx.createLinearGradient(0, height, 0, height - 300);
            floorGrad.addColorStop(0, `rgba(255, 100, 20, ${flicker + 0.08})`);
            floorGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = floorGrad;
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
