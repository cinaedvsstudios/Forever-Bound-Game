<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifex Quest Builder V1.0</title>
  <link rel="stylesheet" href="./v1/styles.css" />
</head>
<body>
  <header class="topbar">
    <section class="brand"><div class="brand-mark">✦</div><div><h1>ARTIFEX</h1><p>Quest Builder <span id="version-badge">V1.0</span></p></div></section>
    <nav class="menu-bar">
      <button id="new-file-button">New</button>
      <label class="menu-file-label">Import JSON<input id="import-json-input" type="file" accept=".json,application/json" hidden></label>
      <button id="export-json-button">Export JSON</button>
      <button id="add-quest-button" class="primary">Add Quest</button>
      <button id="add-block-button" class="primary">Add Block</button>
    </nav>
  </header>

  <main class="app-shell">
    <aside class="side-panel">
      <section class="card">
        <header><h2>Quest File</h2></header>
        <label>File ID<input id="file-id-input"></label>
        <label>File Name<input id="file-name-input"></label>
        <label>Default Chronicle ID<input id="chronicle-id-input" placeholder="chronicle_01"></label>
      </section>

      <section class="card">
        <header><h2>Quests</h2></header>
        <div id="quest-list" class="stack-list"></div>
      </section>

      <section class="card">
        <header><h2>Selected Quest</h2></header>
        <label>Quest Name<input id="quest-name-input"></label>
        <label>Quest Type<select id="quest-type-input"><option value="main">main</option><option value="side">side</option><option value="errand">errand</option><option value="tutorial">tutorial</option></select></label>
        <label>Calling Text<textarea id="calling-text-input" rows="3"></textarea></label>
        <label>Scene IDs<input id="quest-scenes-input" placeholder="scene_forest, scene_church"></label>
        <label>Object IDs<input id="quest-objects-input" placeholder="npc_vitus, relic_chalice"></label>
        <label>Completion Flag<input id="completion-flag-input" placeholder="chalice_delivered"></label>
        <label>Rewards<input id="quest-rewards-input" placeholder="silver:20, unlock:route_bridge"></label>
        <label>Codice Updates<input id="quest-codice-input" placeholder="codice_chalice_truth"></label>
        <label>Notes<textarea id="quest-notes-input" rows="4"></textarea></label>
      </section>
    </aside>

    <section class="workspace-column">
      <section class="workspace-toolbar"><button id="delete-quest-button">Delete Quest</button><button id="delete-block-button">Delete Block</button><span id="status-text">Ready.</span></section>
      <section class="workspace"><canvas id="module-canvas" width="1280" height="720"></canvas><div id="toast-area"></div></section>
      <section class="bottom-panel"><header><h2>Quest Flow Blocks</h2><span id="block-count">0 blocks</span></header><div id="block-list" class="record-list"></div></section>
    </section>

    <aside class="right-panel">
      <section class="card">
        <header><h2>Selected Block</h2></header>
        <label>Block Name<input id="block-name-input"></label>
        <label>Block Type<select id="block-type-input"><option value="scene">scene</option><option value="dialogue">dialogue</option><option value="object">object</option><option value="condition">condition</option><option value="capra">capra</option><option value="codice">codice</option><option value="reward">reward</option><option value="route">route</option><option value="ui">ui</option><option value="completion">completion</option></select></label>
        <label>Scene ID<input id="block-scene-input"></label>
        <label>Object ID<input id="block-object-input"></label>
        <label>Dialogue ID<input id="block-dialogue-input"></label>
        <label>Condition<input id="block-condition-input" placeholder="flag_true:chalice_collected"></label>
        <label>Action / Outcome<input id="block-action-input" placeholder="set_flag:quest_complete"></label>
        <label>UI Overlay<input id="block-overlay-input" placeholder="capra_popup, calling_fulfilled"></label>
        <label>Capra Feedback<textarea id="block-capra-input" rows="3"></textarea></label>
        <label>Notes<textarea id="block-notes-input" rows="4"></textarea></label>
      </section>
      <section class="card"><header><h2>JSON Preview</h2></header><pre id="json-preview"></pre></section>
    </aside>
  </main>

  <script type="module" src="./v1/src/module-app.js"></script>
</body>
</html>
