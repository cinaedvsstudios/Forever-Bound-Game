ext-overflow:ellipsis;white-space:nowrap}.quest-item span,.record-item span{display:block;color:#8a7465;font-size:10px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}label{display:grid;gap:6px;margin:11px 0;color:#8a7465;font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:800}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:9px 10px;color:var(--text);background:#101112;box-shadow:inset 0 2px 6px rgba(0,0,0,.55)}textarea{resize:vertical;min-height:72px}.editor-dialog,.json-dialog,.wizard-dialog{border:1px solid var(--border);border-radius:20px;background:rgba(24,25,26,.98);color:var(--text);box-shadow:0 18px 46px rgba(0,0,0,.88);width:min(780px,92vw);max-height:88vh}dialog::backdrop{background:rgba(0,0,0,.68);backdrop-filter:blur(4px)}.dialog-header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--soft);padding-bottom:12px;margin-bottom:14px}.dialog-close{border-radius:999px;min-width:38px}.editor-section{display:none}.editor-section.is-active{display:block}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--soft);margin-top:14px}.dialog-body{color:var(--text);line-height:1.55}.wizard-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.wizard-full{grid-column:1/-1}.block-type-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}.block-type-card{border:1px solid var(--border);border-radius:14px;padding:10px;background:#101112}.block-type-card strong{display:block;color:var(--gold2);margin-bottom:4px}.block-type-card span{color:var(--muted);font-size:12px}pre{white-space:pre-wrap;max-height:65vh;overflow:auto;background:#101112;border:1px solid var(--border);border-radius:12px;padding:12px;color:#d7d0c9;font-family:Consolas,monospace;font-size:11px}#toast-area{position:absolute;right:22px;bottom:22px;display:grid;gap:8px;pointer-events:none;z-index:40 <body>
  <header class="topbar"><section class="brand"><div class="brand-mark">✦</div><div><h1>ARTIFEX</h1><p>Quest Builder <span class="badge" id="version-badge">V1.0.6</span></p></div></section><nav class="menu-bar" aria-label="Quest Builder menus"><div class="menu"><button class="menu-button" data-menu="file">File ▾</button><div class="menu-panel" id="menu-file"><button id="new-quest-wizard-button">New Quest Wizard</button><button id="new-file-button">New Quest File</button><label class="file-label">Import JSON<input id="import-json-input" type="file" accept=".json,application/json" hidden></label><button id="export-json-button">Export JSON</button><button id="save-local-button">Save Locally in Browser</button></div></div><div class="menu"><button class="menu-button" data-menu="edit">Edit ▾</button><div class="menu-panel" id="menu-edit"><button id="add-quest-button">Add Quest</button><button id="edit-quest-button">Edit Selected Quest</button><button id="delete-quest-button">Delete Selected Quest</button><button id="edit-block-button">Edit Selected Block</button><button id="delete-block-button">Delete Selected Block</button></div></div><div class="menu"><button class="menu-button" data-menu="view">View ▾</button><div class="menu-panel" id="menu-view"><button id="bg-dark-button">Background: Charcoal</button><button id="bg-light-button">Background: Light</button><button id="snapshot-button">Snapshot Canvas</button><button id="reset-flow-window-button">Reset Quest Flow Window</button></div></div><div class="menu"><button class="menu-button primary" data-menu="templates">Templates ▾</button><div class="menu-panel wide" id="menu-templates"><section class="insert-section"><h3>Quest Starters</h3><button id="template-main-quest-button">✦ Main Quest Template</button><button id="template-side-quest-button">◇ Side Quest / Errand Template</button></section><section class="insert-section"><h3>Quest Block Types</h3><div id="block-type-menu"></div></section></div></div><div class="menu   <main class="app-shell"><aside class="side-panel"><span id="status-text">Ready.</span><section class="card"><header><h2>Quest File</h2></header><p class="mini-label">File</p><strong id="file-summary-name">Untitled Quest File</strong><p class="mini-copy" id="file-summary-meta">chronicle_01</p><button id="edit-file-button" class="small-button">Edit File Info</button></section><section class="card"><header><h2>Quests</h2><button id="side-add-quest-button" class="small-button">+</button></header><div id="quest-list" class="stack-list"></div></section><section class="card"><header><h2>Selected</h2></header><p class="mini-label">Calling</p><p id="calling-summary" class="summary-copy">Select a Quest to view its Calling.</p><div class="button-row"><button id="side-edit-quest-button">Edit Quest</button><button id="side-add-block-button">Add Block</button></div></section></aside><section class="workspace-column" id="workspace-column"><section class="workspace pan-ready" id="workspace"><canvas id="module-canvas" width="1280" height="720"></canvas><div class="viewport-controls" aria-label="Viewport controls"><button id="zoom-out-button">−</button><span id="zoom-readout">100%</span><button id="zoom-in-button">+</button><button id="zoom-reset-button">Reset</button></div><div id="toast-area"></div></section><section id="flow-window" class="flow-window" aria-label="Draggable Quest Flow window"><header id="flow-window-header" class="flow-window-header"><div class="flow-title"><h2>Quest Flow</h2><span id="block-count">0 blocks</span></div><div class="flow-window-actions"><button id="add-flow-block-button" title="Add block">+</button><button id="toggle-flow-layout-button" title="Toggle horizontal / vertical layout">⇅</button><button id="collapse-flow-button" title="Collapse Quest Flow">−</button></div></header><div id="block-list" class="flow-strip"></div></section></section></main>
  <dialog id="editor-dialog" class="editor-dialog"><form method="dialog"><header class="dialog-header"><h2 id="editor-title">Edit</h2><button value="close" class="dialog-close">×</button></header><section id="file-editor" class="editor-section"><label>File ID<input id="file-id-input"></label><label>File Name<input id="file-name-input"></label><label>Default Chronicle ID<input id="chronicle-id-input" placeholder="chronicle_01"></label></section><section id="quest-editor" class="editor-section"><label>Quest Name<input id="quest-name-input"></label><label>Quest Type<select id="quest-type-input"><option value="main">main</option><option value="side">side</option><option value="errand">errand</option><option value="tutorial">tutorial</option></select></label><label>Calling Text<textarea id="calling-text-input" rows="3"></textarea></label><label>Scene IDs<input id="quest-scenes-input" placeholder="scene_forest, scene_church"></label><label>Object IDs<input id="quest-objects-input" placeholder="npc_vitus, relic_chalice"></label><label>Completion Flag<input id="completion-flag-input" placeholder="chalice_delivered"></label><label>Rewards<input id="quest-rewards-input" placeholder="silver:20, unlock:route_bridge"></label><label>Codice Updates<input id="quest-codice-input" placeholder="codice_chalice_truth"></label><label>Notes<textarea id="quest-notes-input" rows="4"></textarea></label></section><section id="block-editor" class="editor-section"><label>Block Name<input id="block-name-input"></label><label>Block Type<select id="block-type-input"></select></label><label>Scene ID<input id="block-scene-input"></label><label>Object ID<input id="block-object-input"></label><label>Dialogue ID<input id="block-dialogue-input"></label><label>Condition<input id="block-condition-input" placeholder="flag_true:chalice_collected"></label><label>Action / Outcome<input id="block-action-input" placeholder="set_flag:quest_complete"></label><label>UI Overlay<input id="block-overlay-input" placeholder="capra_popup, calling_fulfilled"></label><label>Capra Feedback<textarea id="block-capra-input" rows="3"></textarea></label><label>Notes<textarea id="block-notes-input" rows="4"></textarea></label></section><footer class="dialog-actions"><button id="save-editor-button" value="close" class="primary">Save</button></footer></form></dialog>
  <dialog id="wizard-dialog" class="wizard-dialog"><form method="dialog"><header class="dialog-header"><h2>New Quest Wizard</h2><button value="close" class="dialog-close">×</button></header><div class="wizard-grid"><label>Quest Name<input id="wizard-name-input" value="New Quest"></label><label>Quest Type<select id="wizard-type-input"><option value="main">main</option><option value="side">side</option><option value="errand">errand</option><option value="tutorial">tutorial</option></select></label><label class="wizard-full">Calling Text<textarea id="wizard-calling-input" rows="3">Define what the player needs to do.</textarea></label><label>Starting Scene ID<input id="wizard-scene-input" placeholder="scene_forest"></label><label>Key Object / NPC ID<input id="wizard-object-input" placeholder="npc_vitus or relic_chalice"></label><label>Completion Flag<input id="wizard-flag-input" placeholder="quest_complete"></label><label>Starter Flow<select id="wizard-flow-input"><option value="simple">Scene → Interaction → Completion</option><option value="dialogue">Scene → Dialogue → Object → Completion</option><option value="puzzle">Scene → Clue → Condition → Capra → Completion</option><option value="combat">Scene → Combat → Reward → Completion</option></select></label></div><footer class="dialog-actions"><button id="create-wizard-quest-button" value="close" class="primary">Create Quest</button></footer></form></dialog>

  <script>
    const VERSION='V1.0.6',KEY='artifex_quest_builder_local_saves',W=1280,H=720;
    const BLOCK_TYPES={scene:{name:'Scene Block',emoji:'🖼️',hint:'Loads, gates, or checks a playable scene.'},travel:{name:'Travel Section',emoji:'🚶',hint:'Side-scrolling route or movement challenge.'},dialogue:{name:'Dialogue Block',emoji:'💬',hint:'NPC, companion, or story conversation.'},object:{name:'Object Interaction',emoji:'🧩',hint:'Pick up, use, give, inspect, or activate an object.'},information:{name:'Information / Clue',emoji:'🔎',hint:'Talk, inspect, decode, or discover what Mel must know.'},condition:{name:'Condition / Flag',emoji:'🔀',hint:'Checks flags, requirements, world state, or prerequisites.'},route:{name:'Route / Map Unlock',emoji:'🗺️',hint:'Opens paths, Stone Markers, doors, bridges, or map nodes.'},ritual:{name:'Ritual Sequence',emoji:'🕯️',hint:'Places ingredients, uses Songspells, relics, or ritual order.'},combat:{name:'Combat / Foe',emoji:'⚔️',hint:'Defeat Foes, Guardians, Castellans, or Bellators.'},companion:{name:'Companion Assist',emoji:'🤝',hint:'Uses Erik, Vitus, Greta, Ivalio, Merdeha, or another helper.'},cleansing:{name:'Cleanse / Purify',emoji:'✨',hint:'Removes Sekhemra, frees a Thrall, or weakens Cursed Ground.'},capra:{name:'Capra Feedback',emoji:'🐐',hint:'Wrong-object hint, reminder, warning, or puzzle feedback.'},codice:{name:'Codice Update',emoji:'📜',hint:'Adds clues, prophecies, translations, or lore entries.'},reward:{name:'Reward',emoji:'🎁',hint:'Silver, supplies, relics, heart rewards, unlocks, or gifts.'},ui:{name:'UI Overlay',emoji:'🪟',hint:'Calling Fulfilled, popup, map, inventory, or custom overlay.'},completion:{name:'Calling Fulfilled',emoji:'✅',hint:'Final Quest completion condition and next unlock.'}};
    let mode='dark',activeQuest=0,activeBlock=0,zoom=1,panX=0,panY=0,flowPos={x:26,y:72};
    const doc={id:'quest_file_demo',name:'Untitled Quest File',moduleKind:'quest-builder',version:VERSION,designWidth:W,designHeight:H,defaultChronicleId:'chronicle_01',quests:[{id:'quest_demo',name:'Recover the Chalice',type:'main',chronicleId:'chronicle_01',callingText:'Find the true chalice and bring it to the altar.',sceneIds:['scene_church','scene_crypt'],objectIds:['npc_vitus','relic_chalice','altar'],completionFlag:'chalice_delivered',rewards:['silver:20','unlock:route_bridge'],codiceUpdates:['codice_chalice_truth'],notes:'',blocks:[{id:'b1',name:'Enter Church',type:'scene',sceneId:'scene_church',objectId:'',dialogueId:'',condition:'',action:'set_flag:church_entered',uiOverlay:'',capraFeedback:'',notes:''},{id:'b2',name:'Speak With Vitus',type:'dialogue',sceneId:'',objectId:'npc_vitus',dialogueId:'ch01_q03_vitus_warning',condition:'',action:'',uiOverlay:'',capraFeedback:'',notes:''},{id:'b3',name:'Collect Chalice',type:'object',sceneId:'',objectId:'relic_chalice',dialogueId:'',condition:'',action:'set_flag:chalice_collected',uiOverlay:'',capraFeedback:'',notes:''},{id:'b4',name:'Wrong Cup Warning',type:'capra',sceneId:'',objectId:'',dialogueId:'',condition:'wrong_item_used',action:'',uiOverlay:'capra_popup',capraFeedback:'That is not the vessel the Calling seeks.',notes:''},{id:'b5',name:'Update Codice',type:'codice',sceneId:'',objectId:'',dialogueId:'',condition:'',action:'unlock_codice:codice_chalice_truth',uiOverlay:'',capraFeedback:'',notes:''},{id:'b6',name:'Calling Fulfilled',type:'completion',sceneId:'',objectId:'',dialogueId:'',condition:'flag_true:chalice_delivered',action:'',uiOverlay:'calling_fulfilled',capraFeedback:'',notes:''}]}]};
    const $=id=>document.getElementById(id),quest=()=>doc.quests[activeQuest]||null,block=()=>quest()?.blocks?.[activeBlock]||null,list=v=>Array.isArray(v)?v:String(v||'').split(',').map(x=>x.trim()).filter(Boolean),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])),meta=t=>BLOCK_TYPES[t]||{name:titleCase(t||'block'),emoji:'◇',hint:'Custom Quest block.'};
    function boot(){fillBlockTypeMenus();wireMenus();wireActions();wireInputs();wireFlowDrag();wireWorkspacePan();render();toast(`Quest Builder ${VERSION} loaded.`)}
    function fillBlockTypeMenus(){const menu=$('block-type-menu'),sel=$('block-type-input');if(menu)menu.innerHTML=Object.entries(BLOCK_TYPES).map(([k,i])=>`<button type="button" data-add-block="${k}">${i.emoji} ${i.name}<small>${i.hint}</small></button>`).join('');if(sel)sel.innerHTML=Object.entries(BLOCK_TYPES).map(([k,i])=>`<option value="${k}">${i.emoji} ${i.name}</option>`).join('')}
    function wireMenus(){document.querySelectorAll('.menu-button').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const p=$('menu-'+b.dataset.menu),o=p?.classList.contains('open');closeMenus();if(p&&!o)p.classList.add('open')}));document.querySelectorAll('.menu-panel').forEach(p=>p.addEventListener('click',e=>e.stopPropagation()));document.addEventListener('click',closeMenus)}
    function closeMenus(){document.querySelectorAll('.menu-panel.open').forEach(p=>p.classList.remove('open'))}
    function wireFlowDrag(){const win=$('flow-window'),handle=$('flow-window-header');let dragging=false,startX=0,startY=0,baseX=0,baseY=0;handle.addEventListener('pointerdown',e=>{if(e.target.closest('button'))return;e.preventDefault();dragging=true;startX=e.clientX;startY=e.clientY;baseX=flowPos.x;baseY=flowPos.y;win.classList.add('dragging');document.body.style.cursor='grabbing'});window.addEventListener('pointermove',e=>{if(!dragging)return;e.preventDefault();const b=$('workspace-column').getBoundingClientRect();flowPos.x=Math.max(-win.offsetWidth+70,Math.min(baseX+e.clientX-startX,b.width-70));flowPos.y=Math.max(0,Math.min(baseY+e.clientY-startY,b.height-42));applyFlowPosition()},{passive:false});window.addEventListener('pointerup',()=>{if(!dragging)return;dragging=false;win.classList.remove('dragging');document.body.style.cursor=''});window.addEventListener('pointercancel',()=>{dragging=false;win.classList.remove('dragging');document.body.style.cursor=''})}
    function wireWorkspacePan(){const ws=$('workspace');let panning=false,startX=0,startY=0,baseX=0,baseY=0;ws.addEventListener('mousedown',e=>{if(e.button!==1)return;e.preventDefault();e.stopPropagation();panning=true;startX=e.clientX;startY=e.clientY;baseX=panX;baseY=panY;ws.classList.add('panning');document.body.style.cursor='grabbing'},true);ws.addEventListener('auxclick',e=>{if(e.button===1){e.preventDefault();e.stopPropagation()}},true);window.addEventListener('mousemove',e=>{if(!panning)return;e.preventDefault();panX=baseX+e.clientX-startX;panY=baseY+e.clientY-startY;applyCanvasTransform()},{passive:false});window.addEventListener('mouseup',e=>{if(e.button!==1&&!panning)return;panning=false;ws.classList.remove('panning');document.body.style.cursor=''});document.addEventListener('mousedown',e=>{if(e.button===1)e.preventDefault()},true)}
    function applyFlowPosition(){const w=$('flow-window');w.style.left=flowPos.x+'px';w.style.top=flowPos.y+'px'}function applyCanvasTransform(){canvas.style.transform=`translate(${panX}px, ${panY}px) scale(${zoom})`}
    function addQuest(p={}){doc.quests.push({id:'quest_'+Date.now(),name:'New Quest',type:'main',chronicleId:doc.defaultChronicleId,callingText:'Define the Calling text for this Quest.',sceneIds:[],objectIds:[],completionFlag:'',rewards:[],codiceUpdates:[],notes:'',blocks:[],...p});activeQuest=doc.quests.length-1;activeBlock=0;render()}function addBlock(type='scene',p={}){if(!quest())addQuest();const item=meta(type);quest().blocks.push({id:'block_'+Date.now(),name:item.name,type,sceneId:'',objectId:'',dialogueId:'',condition:'',action:'',uiOverlay:'',capraFeedback:'',notes:'',...p});activeBlock=quest().blocks.length-1;render()}function removeQuest(){if(!quest())return;doc.quests.splice(activeQuest,1);activeQuest=Math.max(0,Math.min(activeQuest,doc.quests.length-1));activeBlock=0;render()}function removeBlock(){if(!block())return;quest().blocks.splice(activeBlock,1);activeBlock=Math.max(0,Math.min(activeBlock,quest().blocks.length-1));render()}
    function openEditor(which){if(which==='quest'&&!quest())addQuest();if(which==='block'&&!block())addBlock();document.querySelectorAll('.editor-section').forEach(s=>s.classList.remove('is-active'));$(which+'-editor')?.classList.add('is-active');$('editor-title').textContent=which==='file'?'Edit Quest File':which==='quest'?'Edit Quest':'Edit Quest Block';fillInputs();$('editor-dialog').showModal()}function fillInputs(){set('file-id-input',doc.id);set('file-name-input',doc.name);set('chronicle-id-input',doc.defaultChronicleId);const q=quest()||{};set('quest-name-input',q.name);set('quest-type-input',q.type||'main');set('calling-text-input',q.callingText);set('quest-scenes-input',(q.sceneIds||[]).join(', '));set('quest-objects-input',(q.objectIds||[]).join(', '));set('completion-flag-input',q.completionFlag);set('quest-rewards-input',(q.rewards||[]).join(', '));set('quest-codice-input',(q.codiceUpdates||[]).join(', '));set('quest-notes-input',q.notes);const b=block()||{};set('block-name-input',b.name||'');set('block-type-input',b.type||'scene');set('block-scene-input',b.sceneId||'');set('block-object-input',b.objectId||'');set('block-dialogue-input',b.dialogueId||'');set('block-condition-input',b.condition||'');set('block-action-input',b.action||'');set('block-overlay-input',b.uiOverlay||'');set('block-capra-input',b.capraFeedback||'');set('block-notes-input',b.notes||'')}function set(id,v){const el=$(id);if(el)el.value=v??''}function txt(id,v){const el=$(id);if(el)el.textContent=v??''}
    function wireInputs(){bind('file-id-input',v=>doc.id=v);bind('file-name-input',v=>doc.name=v||'Untitled Quest File');bind('chronicle-id-input',v=>doc.defaultChronicleId=v||'chronicle_01');bind('quest-name-input',v=>quest().name=v||'New Quest');bind('quest-type-input',v=>quest().type=v||'main');bind('calling-text-input',v=>quest().callingText=v);bind('quest-scenes-input',v=>quest().sceneIds=list(v));bind('quest-objects-input',v=>quest().objectIds=list(v));bind('completion-flag-input',v=>quest().completionFlag=v);bind('quest-rewards-input',v=>quest().rewards=list(v));bind('quest-codice-input',v=>quest().codiceUpdates=list(v));bind('quest-notes-input',v=>quest().notes=v);bind('block-name-input',v=>block().name=v||meta(block().type).name);bind('block-type-input',v=>{const b=block();b.type=v;if(!b.name||Object.values(BLOCK_TYPES).some(i=>i.name===b.name))b.name=meta(v).name});bind('block-scene-input',v=>block().sceneId=v);bind('block-object-input',v=>block().objectId=v);bind('block-dialogue-input',v=>block().dialogueId=v);bind('block-condition-input',v=>block().condition=v);bind('block-action-input',v=>block().action=v);bind('block-overlay-input',v=>block().uiOverlay=v);bind('block-capra-input',v=>block().capraFeedback=v);bind('block-notes-input',v=>block().notes=v)}function bind(id,fn){$(id)?.addEventListener('input',e=>{if(quest()||id.startsWith('file')){fn(e.target.value);render()}})}
    function wizardBlocks(flow,sceneId,objectId,flag){const s={name:'Start Scene',type:'scene',sceneId},d={name:'Calling Fulfilled',type:'completion',condition:flag?'flag_true:'+flag:'',uiOverlay:'calling_fulfilled'};if(flow==='dialogue')return[s,{name:'Opening Dialogue',type:'dialogue',objectId,dialogueId:''},{name:'Key Interaction',type:'object',objectId},d];if(flow==='puzzle')return[s,{name:'Find Clue',type:'information',sceneId},{name:'Check Requirement',type:'condition'},{name:'Capra Hint',type:'capra',uiOverlay:'capra_popup'},d];if(flow==='combat')return[s,{name:'Defeat Foe',type:'combat',sceneId},{name:'Reward',type:'reward'},d];return[s,{name:'Key Interaction',type:'object',objectId},d]}function createWizardQuest(){const sceneId=$('wizard-scene-input').value.trim(),objectId=$('wizard-object-input').value.trim(),completionFlag=$('wizard-flag-input').value.trim();addQuest({name:$('wizard-name-input').value.trim()||'New Quest',type:$('wizard-type-input').value||'main',callingText:$('wizard-calling-input').value.trim()||'Define what the player needs to do.',sceneIds:list(sceneId),objectIds:list(objectId),completionFlag,blocks:wizardBlocks($('wizard-flow-input').value,sceneId,objectId,completionFlag)});toast('Quest created from wizard.')}
    function wireActions(){$('new-quest-wizard-button').onclick=()=>{closeMenus();$('wizard-dialog').showModal()};$('create-wizard-quest-button').onclick=()=>createWizardQuest();$('new-file-button').onclick=()=>{doc.quests=[];doc.name='Untitled Quest File';activeQuest=0;activeBlock=0;closeMenus();render();toast('New Quest file created.')};$('save-local-button').onclick=()=>{localStorage.setItem(KEY,JSON.stringify(doc));closeMenus();toast('Saved locally.')};$('add-quest-button').onclick=$('side-add-quest-button').onclick=()=>{addQuest();closeMenus();openEditor('quest');toast('Quest added.')};$('edit-quest-button').onclick=$('side-edit-quest-button').onclick=()=>{closeMenus();openEditor('quest')};$('delete-quest-button').onclick=()=>{removeQuest();closeMenus();toast('Quest deleted.')};$('side-add-block-button').onclick=$('add-flow-block-button').onclick=()=>{addBlock();openEditor('block')};$('edit-block-button').onclick=()=>{closeMenus();openEditor('block')};$('delete-block-button').onclick=()=>{removeBlock();closeMenus();toast('Block deleted.')};$('edit-file-button').onclick=()=>openEditor('file');$('save-editor-button').onclick=()=>toast('Saved.');document.querySelectorAll('[data-add-block]').forEach(b=>{b.onclick=()=>{addBlock(b.dataset.addBlock);closeMenus();openEditor('block')}});$('template-main-quest-button').onclick=()=>{addQuest({name:'New Main Quest',callingText:'Define the main Calling for this Quest.',blocks:[{name:'Start Scene',type:'scene'},{name:'Key Interaction',type:'object'},{name:'Calling Fulfilled',type:'completion',uiOverlay:'calling_fulfilled'}]});closeMenus();openEditor('quest')};$('template-side-quest-button').onclick=()=>{addQuest({name:'New Side Quest',type:'side',callingText:'Define the optional objective or Errand.',blocks:[{name:'Optional Trigger',type:'condition'},{name:'Reward',type:'reward'}]});closeMenus();openEditor('quest')};$('export-json-button').onclick=()=>{const link=document.createElement('a');link.href=URL.createObjectURL(new     function help(t,b){$('help-title').textContent=t;$('help-body').innerHTML=b;$('help-dialog').showModal()}function toast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;$('toast-area').appendChild(d);setTimeout(()=>d.remove(),2600)}
    function render(){applyFlowPosition();txt('version-badge',VERSION);txt('file-summary-name',doc.name);txt('file-summary-meta',doc.defaultChronicleId);const q=quest();txt('calling-summary',q?.callingText||'Select a Quest to view its Calling.');txt('status-text',q?'Editing: '+q.name:'Ready.');txt('block-count',(q?.blocks?.length||0)+' blocks');txt('zoom-readout',Math.round(zoom*100)+'%');$('quest-list').innerHTML='';doc.quests.forEach((it,i)=>{const b=document.createElement('button');b.className='quest-item '+(i===activeQuest?'selected':'');b.innerHTML='<strong>'+esc(it.name)+'</strong><span>'+esc(it.chronicleId)+' / '+esc(it.type)+'</span>';b.onclick=()=>{activeQuest=i;activeBlock=0;render()};b.ondblclick=()=>openEditor('quest');$('quest-list').appendChild(b)});$('block-list').innerHTML='';(q?.blocks||[]).forEach((it,i)=>{const bi=meta(it.type),b=document.createElement('button');b.className='record-item '+(i===activeBlock?'selected':'');b.innerHTML='<span class="block-emoji">'+bi.emoji+'</span><span><strong>'+esc(it.name||bi.name)+'</strong><span>'+esc(bi.name)+' / '+esc(it.sceneId||it.objectId||it.dialogueId||it.condition||'unlinked')+'</span></span>';b.onclick=()=>{activeBlock=i;render()};b.ondblclick=()=>openEditor('block');$('block-list').appendChild(b)});draw()}
    const canvas=$('module-canvas'),ctx=canvas.getContext('2d');function draw(){applyCanvasTransform();canvas.width=W;canvas.height=H;ctx.fillStyle=mode==='light'?'#eef6ef':'#050805';ctx.fillRect(0,0,W,H);const glow=ctx.createRadialGradient(W*.52,H*.42,80,W*.5,H*.5,W*.7);glow.addColorStop(0,'rgba(62,180,137,.16)');glow.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(226,204,167,.07)';for(let x=0;x<W;x+=80)line(x,0,x,H);for(let y=0;y<H;y+=80)line(0,y,W,y);box(32,28,W-64,82,20,'rgba(17,26,20,.86)');ctx.fillStyle='#fff0ce';ctx.font='700 24px Georgia';ctx.fillText('QUEST BUILDER',58,64);const q=quest();ctx.fillStyle='#7ff0bd';ctx.font='600 15px Arial';ctx.fillText(q?`${q.chronicleId} / ${q.name}`:'Create a Quest to begin assembly',58,91);if(!q)return;ctx.fillStyle='rgba(226,204,167,.78)';ctx.font='600 14px Arial';ctx.fillText('Calling: '+short(q.callingText||'No Calling text set',112),60,132);let x=60,y=170,cw=250,ch=118,gap=36;(q.blocks||[]).forEach((it,i)=>{const bi=meta(it.type);if(x+cw>W-40){x=60;y+=ch+58}if(i>0&&x>60){ctx.strokeStyle='rgba(62,180,137,.55)';ctx.lineWidth=2;line(x-gap,y+ch/2,x,y+ch/2)}const sel=i===activeBlock;box(x,y,cw,ch,18,sel?'rgba(62,180,137,.18)':'rgba(17,26,20,.86)',sel?'#3eb489':'rgba(226,204,167,.23)');ctx.fillStyle='#fff0ce';ctx.font='25px Arial';ctx.fillText(bi.emoji,x+18,y+40);ctx.fillStyle='#fff0ce';ctx.font='700 15px Arial';ctx.fillText(short(it.name||bi.name,24),x+60,y+30);ctx.fillStyle='#7ff0bd';ctx.font='600 12px Arial';ctx.fillText(bi.name,x+60,y+52);ctx.fillStyle='rgba(226,204,167,.78)';ctx.font='500 11px Arial';ctx.fillText(short(it.sceneId||it.objectId||it.dialogueId||it.condition||it.action||'unlinked',32),x+60,y+76);if(it.uiOverlay||it.capraFeedback){ctx.fillStyle='rgba(127,240,189,.82)';ctx.fillText(short(it.uiOverlay||'Capra feedback',32),x+60,y+98)}x+=cw+gap})}function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}function box(x,y,w,h,r,fill
