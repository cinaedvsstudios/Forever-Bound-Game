  <script>
    const VERSION='V1.0.2'; const KEY='artifex_quest_builder_local_saves'; const W=1280,H=720; let mode='dark'; let activeQuest=0,activeBlock=0,zoom=1; const doc={id:'quest_file_demo',name:'Untitled Quest File',moduleKind:'quest-builder',version:VERSION,designWidth:W,designHeight:H,defaultChronicleId:'chronicle_01',quests:[{id:'quest_demo',name:'Recover the Chalice',type:'main',chronicleId:'chronicle_01',callingText:'Find the true chalice and bring it to the altar.',sceneIds:['scene_church','scene_crypt'],objectIds:['npc_vitus','relic_chalice','altar'],completionFlag:'chalice_delivered',rewards:['silver:20','unlock:route_bridge'],codiceUpdates:['codice_chalice_truth'],notes:'',blocks:[{id:'b1',name:'Enter Church',type:'scene',sceneId:'scene_church',objectId:'',dialogueId:'',condition:'',action:'set_flag:church_entered',uiOverlay:'',capraFeedback:'',notes:''},{id:'b2',name:'Speak With Vitus',type:'dialogue',sceneId:'',objectId:'npc_vitus',dialogueId:'ch01_q03_vitus_warning',condition:'',action:'',uiOverlay:'',capraFeedback:'',notes:''},{id:'b3',name:'Collect Chalice',type:'object',sceneId:'',objectId:'relic_chalice',dialogueId:'',condition:'',action:'set_flag:chalice_collected',uiOverlay:'',capraFeedback:'',notes:''},{id:'b4',name:'Wrong Cup Warning',type:'capra',sceneId:'',objectId:'',dialogueId:'',condition:'wrong_item_used',action:'',uiOverlay:'capra_popup',capraFeedback:'That is not the vessel the Calling seeks.',notes:''},{id:'b5',name:'Update Codice',type:'codice',sceneId:'',objectId:'',dialogueId:'',condition:'',action:'unlock_codice:codice_chalice_truth',uiOverlay:'',capraFeedback:'',notes:''},{id:'b6',name:'Calling Fulfilled',type:'completion',sceneId:'',objectId:'',dialogueId:'',condition:'flag_true:chalice_delivered',action:'',uiOverlay:'calling_fulfilled',capraFeedback:'',notes:''}]}]};
    const $=id=>document.getElementById(id); const list=v=>Array.isArray(v)?v:String(v||'').split(',').map(x=>x.trim()).filter(Boolean); const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); const quest=()=>doc.quests[activeQuest]||null; const block=()=>quest()?.blocks?.[activeBlock]||null;
    function closeMenus(){document.querySelectorAll('.menu-panel.open').forEach(p=>p.classList.remove('open'))} document.querySelectorAll('.menu-button').forEach(b=>b.onclick=e=>{e.stopPropagation();const p=$('menu-'+b.dataset.menu);const o=p.classList.contains('open');closeMenus();if(!o)p.classList.add('open')}); document.addEventListener('click',closeMenus);
    function addQuest(p={}){doc.quests.push({id:'quest_'+Date.now(),name:'New Quest',type:'main',chronicleId:doc.defaultChronicleId,callingText:'Define the Calling text for this Quest.',sceneIds:[],objectIds:[],completionFlag:'',rewards:[],codiceUpdates:[],notes:'',blocks:[],...p});activeQuest=doc.quests.length-1;activeBlock=0;render();}

    function removeQuest(){if(!quest())return;doc.quests.splice(activeQuest,1);activeQuest=Math.max(0,Math.min(activeQuest,doc.quests.length-1));activeBlock=0;render()} function removeBlock(){if(!block())return;quest().blocks.splice(activeBlock,1);activeBlock=Math.max(0,Math.min(activeBlock,quest().blocks.length-1));render()}

    [['file-id-input',v=>doc.id=v],['file-name-input',v=>doc.name=v||'Untitled Quest File'],['chronicle-id-input',v=>doc.defaultChronicleId=v||'chronicle_01'],['quest-name-input',v=>quest().name=v||'New Quest'],['quest-type-input',v=>quest().type=v||'main'],['calling-text-input',v=>quest().callingText=v],['quest-scenes-input',v=>quest().sceneIds=list(v)],['quest-objects-input',v=>quest().objectIds=list(v)],['completion-flag-input',v=>quest().completionFlag=v],['quest-rewards-input',v=>quest().rewards=list(v)],['quest-codice-input',v=>quest().codiceUpdates=list(v)],['quest-notes-input',v=>quest().notes=v],['block-name-input',v=>block().name=v||'Quest Block'],['block-type-input',v=>block().type=v],['block-scene-input',v=>block().sceneId=v],['block-object-input',v=>block().objectId=v],['block-dialogue-input',v=>block().dialogueId=v],['block-condition-input',v=>block().condition=v],['block-action-input',v=>block().action=v],['block-overlay-input',v=>block().uiOverlay=v],['block-capra-input',v=>block().capraFeedback=v],['block-notes-input',v=>block().notes=v]].forEach(([id,fn])=>$(id)?.addEventListener('input',e=>{if(quest()||id.startsWith('file')){fn(e.target.value);render()}}));
    $('new-file-button').onclick=()=>{doc.quests=[];doc.name='Untitled Quest File';activeQuest=0;activeBlock=0;render();toast('New Quest file created.')};$('save-local-button').onclick=()=>{localStorage.setItem(KEY,JSON.stringify(doc));toast('Saved locally.')};$('add-quest-button').onclick=$('side-add-quest-button').onclick=()=>{addQuest();openEditor('quest');toast('Quest added.')};$('edit-quest-button').onclick=$('side-edit-quest-button').onclick=()=>openEditor('quest');$('delete-quest-button').onclick=()=>{removeQuest();toast('Quest deleted.')};$('side-add-block-button').onclick=()=>{addBlock();openEditor('block')};$('edit-block-button').onclick=()=>openEditor('block');$('delete-block-button').onclick=()=>{removeBlock();toast('Block deleted.')};$('edit-file-button').onclick=()=>openEditor('file');$('save-editor-button').onclick=()=>toast('Saved.');document.querySelectorAll('[data-add-block]').forEach(b=>b.onclick=()=>{addBlock(b.dataset.addBlock);closeMenus();openEditor('block')});$('template-main-quest-button').onclick=()=>{addQuest({name:'New Main Quest',callingText:'Define the main Calling for this Quest.',blocks:[{name:'Start Scene',type:'scene'},{name:'Key Interaction',type:'object'},{name:'Completion',type:'completion',uiOverlay:'calling_fulfilled'}]});openEditor('quest')};$('template-side-quest-button').onclick=()=>{addQuest({name:'New Side Quest',type:'side',callingText:'Define the optional objective or Errand.',blocks:[{name:'Optional Trigger',type:'condition'},{name:'Reward',type:'reward'}]});openEditor('quest')};$('export-json-button').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(doc,null,2)],{type:'application/json'}));a.download=(doc.name||'quest-file').toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.json';a.click();toast('JSON exported.')};$('view-json-button').onclick=()=>{$('json-preview').textContent=JSON.stringify(doc,null,2);$('json-dialog').showModal()};$('library-note-button').onclick=()=>help('Linked Libraries','Quest Builder references completed scenes, archetype objects, dialogue IDs, Capra popup templates, Codice entries, UI overlays, rewards, and route unlocks. It should not own those libraries directly.');$('quick-start-button').onclick=()=>help('Quick Start','Select a Quest on the left. Select a block in the horizontal Quest Flow strip. Use Edit or Templates to open the popup editor. Press Save to close the popup.');$('about-button').onclick=()=>help('About Quest Builder','Quest Builder assembles scenes, archetype objects, dialogue, Capra feedback, Codice updates, UI overlays, rewards, and completion flags into playable Quest flow.');$('bg-dark-button').onclick=()=>{mode='dark';draw()};$('bg-light-button').onclick=()=>{mode='light';draw()};$('zoom-in-button').onclick=()=>{zoom=Math.min(2,zoom+.1);render()};$('zoom-out-button').onclick=()=>{zoom=Math.max(.5,zoom-.1);render()};$('zoom-reset-button').onclick=()=>{zoom=1;render()};$('import-json-input').onchange=async e=>{const f=e.target.files[0];if(!f)return;Object.assign(doc,JSON.parse(await f.text()));activeQuest=0;activeBlock=0;render();toast('JSON imported.')};
    function help(t,b){$('help-title').textContent=t;$('help-body').textContent=b;$('help-dialog').showModal()} function toast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;$('toast-area').appendChild(d);setTimeout(()=>d.remove(),2600)}
    function render(){txt('version-badge',VERSION);txt('file-summary-name',doc.name);txt('file-summary-meta',doc.defaultChronicleId);const q=quest();txt('calling-summary',q?.callingText||'Select a Quest to view its Calling.');txt('status-text',q?'Editing '+q.name:'Ready.');txt('block-count',(q?.blocks?.length||0)+' blocks');$('quest-list').innerHTML='';doc.quests.forEach((q,i)=>{const b=document.createElement('button');b.className='quest-item '+(i===activeQuest?'selected':'');b.innerHTML='<strong>'+esc(q.name)+'</strong><span>'+esc(q.chronicleId)+' / '+esc(q.type)+'</span>';b.onclick=()=>{activeQuest=i;activeBlock=0;render()};b.ondblclick=()=>openEditor('quest');$('quest-list').appendChild(b)});$('block-list').innerHTML='';(q?.blocks||[]).forEach((bl,i)=>{const b=document.createElement('button');b.className='record-item '+(i===activeBlock?'selected':'');b.innerHTML='<strong>'+esc(bl.name)+'</strong><span>'+esc(bl.type)+' / '+esc(bl.sceneId||bl.objectId||bl.dialogueId||bl.condition||'unlinked')+'</span>';b.onclick=()=>{activeBlock=i;render()};b.ondblclick=()=>openEditor('block');$('block-list').appendChild(b)});draw();}
    const canvas=$('module-canvas'),ctx=canvas.getContext('2d');function draw(){const w=W,h=H;canvas.width=w;canvas.height=h;ctx.fillStyle=mode==='light'?'#eef6ef':'#050805';ctx.fillRect(0,0,w,h);let g=ctx.createRadialGradient(w*.52,h*.42,80,w*.5,h*.5,w*.7);g.addColorStop(0,'rgba(62,180,137,.16)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(226,204,167,.07)';for(let x=0;x<w;x+=80)line(x,0,x,h);for(let y=0;y<h;y+=80)line(0,y,w,y);box(32,28,w-64,82,20,'rgba(17,26,20,.86)');ctx.fillStyle='#fff0ce';ctx.font='700 24px Georgia';ctx.fillText('QUEST BUILDER',58,64);ctx.fillStyle='#7ff0bd';ctx.font='600 15px Arial';const q=quest();ctx.fillText(q?`${q.chronicleId} / ${q.name}`:'Create a Quest to begin assembly',58,91);if(!q)return;ctx.fillStyle='rgba(226,204,167,.78)';ctx.font='600 14px Arial';ctx.fillText('Calling: '+short(q.callingText||'No Calling text set',110),60,132);let x=60,y=160,cw=230,ch=116,gap=34;(q.blocks||[]).forEach((bl,i)=>{if(x+cw>w-40){x=60;y+=ch+58}if(i>0&&x>60){ctx.strokeStyle='rgba(62,180,137,.55)';ctx.lineWidth=2;line(x-gap,y+ch/2,x,y+ch/2)}box(x,y,cw,ch,18,i===activeBlock?'rgba(62,180,137,.18)':'rgba(17,26,20,.86)',i===activeBlock?'#3eb489':'rgba(226,204,167,.23)');ctx.fillStyle='#fff0ce';ctx.font='700 15px Arial';ctx.fillText(short(bl.name,24),x+16,y+28);ctx.fillStyle='#7ff0bd';ctx.font='600 12px Consolas';ctx.fillText(bl.type||'block',x+16,y+52);ctx.fillStyle='rgba(226,204,167,.78)';ctx.font='500 11px Arial';ctx.fillText(short(bl.sceneId||bl.objectId||bl.dialogueId||bl.condition||bl.action||'unlinked',34),x+16,y+78);if(bl.uiOverlay||bl.capraFeedback){ctx.fillStyle='rgba(127,240,189,.82)';ctx.fillText(short(bl.uiOverlay||'Capra feedback',34),x+16,y+99)}x+=cw+gap})}function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}function box(x,y,w,h,r,fill,stroke='rgba(226,204,167,.25)'){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.stroke()}function short(v,m){v=String(v||'');return v.length>m?v.slice(0,m-1)+'…':v} render(); toast('Quest Builder '+VERSION+' loaded.');
