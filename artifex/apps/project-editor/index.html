<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artifex Project Editor v0.1.25 TODOS - Flatplan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: '#0a0a0f',
            slateDark: '#12121a',
            cardDark: '#181824',
            projectGold: '#d6a24c',
            projectGoldGlow: '#f4c76a',
            projectGreen: '#9fba5a',
            projectParchment: '#f8f0c8',
            accentDark: '#5a3a12'
          },
          boxShadow: {
            'project-glow': '0 0 15px rgba(214, 162, 76, 0.45)',
            'card-glow': '0 4px 20px rgba(0, 0, 0, 0.6)'
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./src/project-theme-overrides.css?v=0.1.25-todos">
  <style>
    html,
    body {
      background: #0a0a0f;
      color: #f1f5f9;
    }
    .bg-obsidian { background-color: #0a0a0f !important; }
    .bg-slateDark { background-color: #12121a !important; }
    .bg-cardDark { background-color: #181824 !important; }

      border-color: rgba(214, 162, 76, 0.72);
      background: rgba(90, 58, 18, 0.55);
