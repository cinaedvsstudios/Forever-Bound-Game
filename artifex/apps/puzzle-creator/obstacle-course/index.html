<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obstacle Course · Puzzle Creator V2.7.8 · Forever Bound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js"
      }
    }
  </script>
  <style>
    :root{
      --cream:#f4ead4;--muted:#c9bfae;--green:#9ee6a4;--green2:#9ee6a4;--yellow:#eec45a;--gold:#eec45a;--purple:#be8bde;
      --charcoal:#07050b;--panel:#120b18;--line:#6d4a7a;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#05080d;color:var(--cream);font-family:Inter,Segoe UI,Arial,sans-serif;overflow:hidden}
    .app-shell{min-height:100vh;display:grid;grid-template-rows:92px 1fr;background:linear-gradient(145deg,#050307,#07101c 54%,#06130b)}
    .app-header{height:92px;display:grid;grid-template-columns:minmax(240px,1fr) auto;align-items:center;gap:18px;padding:14px 18px;border-bottom:1px solid rgba(190,139,222,.24);background:rgba(8,5,12,.92)}
    .brand-lockup{display:flex;align-items:center;gap:12px}.brand-sigil{width:42px;height:42px;display:grid;place-items:center;border:1px solid rgba(238,196,90,.44);border-radius:14px;background:rgba(238,196,90,.08)}.brand-rune{font-size:1.4rem;color:var(--gold)}
    .eyebrow{letter-spacing:.16em;text-transform:uppercase;color:var(--green);font-size:.68rem;font-weight:900;margin:0 0 4px}.title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.title-row h1{font-family:Cinzel,Georgia,serif;font-size:1.35rem;line-height:1;margin:0}.version-pill,.status-pill{border:1px solid rgba(238,196,90,.48);border-radius:999px;padding:5px 9px;color:var(--gold);font-size:.68rem;font-weight:900;letter-spacing:.08em;background:rgba(238,196,90,.08)}
    .module-back-link{justify-self:end;border:1px solid rgba(158,230,164,.35);border-radius:999px;padding:9px 12px;color:var(--cream);text-decoration:none;font-size:.78rem;font-weight:900;background:rgba(20,72,37,.48)}.module-back-link:hover{border-color:rgba(238,196,90,.72)}
    .workspace{height:calc(100vh - 92px);min-height:0;display:grid;grid-template-columns:340px minmax(0,1fr);gap:0}.left-panel{min-height:0;border-right:1px solid rgba(190,139,222,.22);background:rgba(10,8,15,.82);overflow:auto}.left-panel-body{padding:12px}.right-panel{min-height:0;position:relative;overflow:hidden;background:#05080d}
    .panel{border:1px solid rgba(124,202,125,.22);border-radius:16px;padding:14px;background:rgba(7,14,22,.78);box-shadow:0 12px 32px rgba(0,0,0,.24);margin-bottom:12px}.panel-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}.panel-title-row h2{font-family:Cinzel,Georgia,serif;font-size:1rem;margin:2px 0 0}.obstacle-panel-copy,.hint-text{color:var(--muted);font-size:.74rem;line-height:1.4;margin:0 0 10px}
    label.field-block{display:block;color:var(--muted);font-size:.72rem;font-weight:800;margin:9px 0}.field-block span{display:block;margin-bottom:5px}.field-block select,.field-block input,.range-row input{width:100%}.field-block select{background:#0b1219;color:var(--cream);border:1px solid rgba(124,202,125,.26);border-radius:10px;padding:8px}.range-row{display:block;color:var(--muted);font-size:.72rem;font-weight:800;margin:10px 0}.range-row span{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px}.range-row output{color:var(--gold)}
    .wide-button,.primary-button{width:100%;min-height:38px;border:1px solid rgba(124,202,125,.34);border-radius:10px;background:rgba(20,72,37,.62);color:var(--cream);font-weight:900;cursor:pointer}.wide-button:hover,.primary-button:hover{border-color:rgba(238,196,90,.75)}
    .right-preview-layout,.overview-window,.render-viewport{display:none!important}
    @media(max-width:980px){body{overflow:auto}.app-shell{display:block}.app-header{height:auto;grid-template-columns:1fr}.workspace{height:auto;grid-template-columns:1fr}.right-panel{min-height:620px}.module-back-link{justify-self:start}}
  
    .app-header{height:92px;display:grid;grid-template-columns:minmax(290px,auto) minmax(0,1fr) auto;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid rgba(190,139,222,.24);background:rgba(8,5,12,.92)}
    .brand-lockup{justify-self:start;min-width:290px}
    .oc-real-header-actions{justify-self:start;display:flex;align-items:center;gap:10px;min-width:0;max-width:100%;overflow:hidden}
    .oc-header-run{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .oc-header-run button,.oc-header-debug-slot button{min-height:34px;border:1px solid rgba(124,202,125,.42);border-radius:10px;background:rgba(20,72,37,.72);color:#f4ead4;font-weight:900;cursor:pointer;padding:0 10px;font-size:.72rem;white-space:nowrap;font-family:Inter,Segoe UI,Arial,sans-serif}
    .oc-header-run button:disabled{opacity:.45;cursor:not-allowed}
    .oc-header-run button:hover:not(:disabled),.oc-header-debug-slot button:hover{border-color:rgba(238,196,90,.8)}
    .oc-header-run button.is-running{border-color:rgba(158,230,164,.95);background:rgba(36,120,62,.9);box-shadow:0 0 0 2px rgba(158,230,164,.22),0 0 18px rgba(158,230,164,.2)}
    .oc-header-run button.is-paused{border-color:rgba(238,196,90,.95);background:rgba(95,63,9,.88)}
    .oc-header-status{display:grid;gap:1px;min-width:168px;max-width:230px;border:1px solid rgba(238,196,90,.45);border-radius:11px;background:rgba(5,10,16,.78);padding:6px 8px;color:#eec45a;font-size:.62rem;font-weight:900;line-height:1.2}
    .oc-header-status span{color:#c9bfae;font-size:.59rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    @media(max-width:1180px){.app-header{height:auto;grid-template-columns:1fr}.oc-real-header-actions{justify-self:start;flex-wrap:wrap}.module-back-link{justify-self:start}}

  
  /* Corrected obstacle course phase 1 header */

    .app-header{height:92px;display:grid;grid-template-columns:minmax(290px,auto) minmax(0,1fr) auto;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid rgba(190,139,222,.24);background:rgba(8,5,12,.92)}
    .brand-lockup{justify-self:start;min-width:290px}
    .oc-real-header-actions{justify-self:start;display:flex;align-items:center;gap:10px;min-width:0;max-width:100%;overflow:hidden}
    .oc-header-run{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .oc-header-run button,.oc-header-debug-slot button{min-height:34px;border:1px solid rgba(124,202,125,.42);border-radius:10px;background:rgba(20,72,37,.72);color:#f4ead4;font-weight:900;cursor:pointer;padding:0 10px;font-size:.72rem;white-space:nowrap;font-family:Inter,Segoe UI,Arial,sans-serif}
    .oc-header-run button:disabled{opacity:.45;cursor:not-allowed}
    .oc-header-run button:hover:not(:disabled),.oc-header-debug-slot button:hover{border-color:rgba(238,196,90,.8)}
    .oc-header-run button.is-running{border-color:rgba(158,230,164,.95);background:rgba(36,120,62,.9);box-shadow:0 0 0 2px rgba(158,230,164,.22),0 0 18px rgba(158,230,164,.2)}
    .oc-header-run button.is-paused{border-color:rgba(238,196,90,.95);background:rgba(95,63,9,.88)}
    .oc-header-status{display:grid;gap:1px;min-width:168px;max-width:230px;border:1px solid rgba(238,196,90,.45);border-radius:11px;background:rgba(5,10,16,.78);padding:6px 8px;color:#eec45a;font-size:.62rem;font-weight:900;line-height:1.2}
    .oc-header-status span{color:#c9bfae;font-size:.59rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    @media(max-width:1180px){.app-header{height:auto;grid-template-columns:1fr}.oc-real-header-actions{justify-self:start;flex-wrap:wrap}.module-back-link{justify-self:start}}

  </style>
</head>
<body class="is-obstacle-course">
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-lockup"><div class="brand-sigil" aria-hidden="true"><span class="brand-rune">⛰️</span></div><div class="brand-title-block"><p class="eyebrow">Puzzle Creator Module</p><div class="title-row"><h1>Obstacle Course</h1><span class="version-pill">V2.7.8</span></div></div></div>
      <section id="oc-app-header-controls" class="oc-real-header-actions">
        <div class="oc-header-run">
          <button id="obstacle-start" type="button" disabled>Start Test</button>
          <button id="obstacle-pause" type="button">Pause</button>
          <button id="obstacle-reset-run" type="button">Reset Run</button>
          <span id="oc-debug-button-slot" class="oc-header-debug-slot"></span>
        </div>
        <div class="oc-header-status">
          <strong id="obstacle-status">Loading</strong>
          <span id="oc-top-load">Assets 0 / 0</span>
          <span id="oc-top-info">Distance 0 / 0</span>
        </div>
      </section>
      <a class="module-back-link" href="../index.html">← Puzzle menu</a>
    </header>
    <main class="workspace two-panel-workspace">
      <aside class="control-rail left-panel" aria-label="Obstacle Course controls"><div class="left-panel-body"></div></aside>
      <section class="right-panel" aria-label="Obstacle Course preview"></section>
    </main>
  </div>
  <script type="module" src="src/js/main.js?v=2.7.8"></script>
</body>
</html>
