<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obstacle Course · Puzzle Creator V3.0.16 · Forever Bound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js"
      }
    }
  </script>
  <style>
    :root{--bg:#08050c;--panel:#100b18;--cream:#f4ead4;--gold:#eec45a;--green:#9ee6a4;--muted:#c9bfae}
    *{box-sizing:border-box}body{margin:0;overflow:hidden;background:radial-gradient(circle at top,#241932,#08050c 52%);color:var(--cream);font-family:Inter,Segoe UI,Arial,sans-serif}.app-shell{height:100vh;display:grid;grid-template-rows:auto 1fr}.app-header{height:92px;display:grid;grid-template-columns:minmax(290px,auto) minmax(0,1fr) auto;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid rgba(190,139,222,.24);background:rgba(8,5,12,.92)}.brand-lockup{display:flex;align-items:center;gap:12px}.brand-sigil{width:42px;height:42px;display:grid;place-items:center;border:1px solid rgba(238,196,90,.44);border-radius:14px;background:rgba(238,196,90,.08)}.brand-rune{font-size:1.4rem}.eyebrow{margin:0;color:var(--green);font-size:.66rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase}.title-row{display:flex;align-items:center;gap:10px}.title-row h1{font-family:Cinzel,Georgia,serif;margin:0;font-size:1.35rem}.version-pill{border:1px solid rgba(238,196,90,.5);border-radius:999px;padding:5px 8px;color:var(--gold);font-size:.7rem;font-weight:900}.module-back-link{justify-self:end;border:1px solid rgba(158,230,164,.35);border-radius:999px;padding:9px 12px;color:var(--cream);text-decoration:none;font-size:.78rem;font-weight:900;background:rgba(20,72,37,.48)}.workspace{height:100%;min-height:0;display:grid;grid-template-columns:320px minmax(0,1fr);gap:12px;padding:12px}.left-panel,.right-panel{min-height:0;border:1px solid rgba(238,196,90,.24);border-radius:18px;background:rgba(5,10,16,.75);overflow:auto}.left-panel{padding:14px}.right-panel{position:relative}.boot-card{margin:18px;padding:18px;border:1px solid rgba(238,196,90,.32);border-radius:16px;background:rgba(5,10,16,.82)}@media(max-width:1180px){body{overflow:auto}.app-shell{height:auto}.app-header{height:auto;grid-template-columns:1fr}.workspace{height:auto;grid-template-columns:1fr}.module-back-link{justify-self:start}}
  </style>
</head>
<body class="is-obstacle-course">
  <div class="app-shell">
    <header class="app-header"><div class="brand-lockup"><div class="brand-sigil" aria-hidden="true"><span class="brand-rune">⛰️</span></div><div class="brand-title-block"><p class="eyebrow">Puzzle Creator Module</p><div class="title-row"><h1>Obstacle Course</h1><span class="version-pill">V3.0.16</span></div></div></div><a class="module-back-link" href="../index.html">← Puzzle menu</a></header>
    <main class="workspace"><aside class="left-panel"><div class="left-panel-body"></div></aside><section class="right-panel" aria-label="Obstacle Course preview"></section></main>
  </div>
  <script type="module" src="src/js/main.js?v=3.0.16"></script>
</body>
</html>
