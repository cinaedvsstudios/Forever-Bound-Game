<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Potion Match V1</title><style>
:root{--c:#f4ead4;--m:#c9bfae;--g:#9ee6a4;--p:#be8bde;--y:#eec45a}*{box-sizing:border-box}body{margin:0;background:#07050b;color:var(--c);font-family:Inter,Arial,sans-serif}header{height:78px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:linear-gradient(90deg,#06130b,#180d20);border-bottom:1px solid #6d4a7a}h1,h2,h3{font-family:Georgia,serif}h1{font-size:1.4rem}.pill{border:1px solid #a98b4d;border-radius:999px;color:var(--y);padding:6px 10px;font-weight:800}.shell{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 78px)}aside{border-right:1px solid #4d3558;padding:16px;background:#08140d}.panel,.card{border:1px solid #6d4a7a;border-radius:16px;background:#120b18;padding:16px;margin-bottom:14px}.eyebrow{letter-spacing:.16em;text-transform:uppercase;color:var(--g);font-size:.66rem;font-weight:900;margin:0 0 7px}.grid{display:grid;grid-template-columns:minmax(430px,1fr) 280px;gap:14px}.top{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid #493052;padding-bottom:12px}.top p{color:var(--m);font-size:.82rem}.recipe{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:9px;margin:14px 0}.slot{min-height:86px;border:1px dashed #ad8a3a;border-radius:14px;background:#26192d;display:grid;place-items:center;text-align:center;position:relative}.slot.filled{border-style:solid;border-color:#6eaf73;background:#23412c}.slot.current{box-shadow:0 0 0 2px #7b6126}.slot b{position:absolute;top:6px;left:8px;color:#ffffff80;font-size:.65rem}.emoji{font-size:1.9rem}.slot small,.item small{display:block;color:var(--m);font-size:.66rem}.cauldron{height:215px;border-radius:18px;background:radial-gradient(circle at 50% 38%,#72ca86 0,#315b3a 30%,#06100a 60%);display:grid;place-items:center;text-align:center;box-shadow:inset 0 0 40px #000;margin-bottom:14px}.cauldron strong{font-family:Georgia,serif;font-size:1.05rem}.cauldron span{display:block;color:var(--m);font-size:.75rem;margin-top:6px}.tray{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:9px}.item,button{border:1px solid #6d4a7a;border-radius:12px;background:#301c3e;color:var(--c);font-weight:800;cursor:pointer}.item{min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}.item:hover,button:hover{border-color:var(--y);background:#533756}.item[disabled]{opacity:.35}.metric{display:flex;justify-content:space-between;border:1px solid #493052;border-radius:11px;padding:10px;color:var(--m);font-size:.76rem;margin-bottom:10px}.metric strong{color:var(--c)}.bar{height:10px;border-radius:999px;background:#ffffff22;overflow:hidden;margin:10px 0}.fill{height:100%;width:100%;background:linear-gradient(90deg,#db7053,#eec45a,#9ee6a4)}.result{min-height:50px;border:1px solid #493052;border-radius:11px;padding:11px;color:var(--m);font-size:.78rem;line-height:1.4;margin-bottom:10px}.result.success{border-color:#69ad70;color:var(--g);background:#214b2b}.result.error{border-color:#cc6d55;color:#f0a088;background:#4a1d1a}.result.warn{border-color:#c9a64a;color:var(--y);background:#3c2c12}.stack{display:grid;gap:8px}.stack button,aside button{min-height:42px;width:100%}label{display:block;margin:12px 0;font-size:.82rem;font-weight:800}select,input{width:100%;min-height:40px;border-radius:10px;border:1px solid #6d4a7a;background:#08050b;color:var(--c);padding:8px}@media(max-width:950px){.shell,.grid{grid-template-columns:1fr}}
</style></head><body><header><h1>Potion Match <span class="pill">V1</span></h1><strong>Item Order Puzzle Prototype</strong></header><div class="shell"><aside><section class="panel"><p class="eyebrow">Setup</p><h3>Recipe</h3><label>Template<select id="recipeSelect"></select></label><label>Tray Mode<select id="trayMode"><option value="fixed">Fixed tray</option><option value="shuffle">Shuffle after each pick</option></select></label><button id="resetA">Reset Brew</button></section><section class="panel"><p class="eyebrow">Logic</p><h3>Rules</h3><label><input id="strict" type="checkbox" style="width:auto;min-height:auto"> Strict mode</label><label>Allowed mistakes <span id="maxOut">3</span><input id="max" type="range" min="1" max="5" value="3"></label><p id="hint" style="color:var(--m);font-size:.82rem;line-height:1.45"></p></section></aside><main style="padding:18px"><div class="grid"><section class="card"><div class="top"><div><p class="eyebrow">Playable Prototype</p><h2 id="title"></h2><p id="objective"></p></div><span id="status" class="pill">Ready</span></div><div id="recipe" class="recipe"></div><div class="cauldron"><div><strong id="cauldronState">Cauldron waiting</strong><span id="cauldronSub">Add the first ingredient.</span></div></div><div id="tray" class="tray"></div></section><aside class="card"><p class="eyebrow">Brew State</p><h3>Result</h3><div class="metric"><span>Progress</span><strong id="progress"></strong></div><div class="metric"><span>Mistakes</span><strong id="mistakes"></strong></div><div class="bar"><div id="fill" class="fill"></div></div><div class="metric"><span>Quality</span><strong id="quality"></strong></div><div id="result" class="result"></div><div class="stack"><button id="resetB">Reset Brew</button><button id="answer">Show Correct Order</button><button id="shuffle">Shuffle Tray</button></div></aside></div></main></div><script>
const R={healing:{t:"Healing Tisane",o:"Add the ingredients in the shown order to complete the brew.",h:"Root before bloom, bloom before milk, milk before star.",done:"Healing Tisane Complete",seq:[["yarrow","Yarrow","🌿"],["lavender","Lavender","💜"],["milk","Capra Milk","🥛"],["dust","Star Dust","✨"]],dec:[["salt","Salt","🧂"],["mushroom","Mushroom","🍄"],["moon","Moonflower","🌙"]]},moon:{t:"Moonmilk Charm",o:"Build the lunar mixture in the correct order.",h:"Moon, milk, flower, dust; fire is not part of this charm.",done:"Moonmilk Charm Complete",seq:[["moon","Moonflower","🌙"],["milk","Capra Milk","🥛"],["lavender","Lavender","💜"],["dust","Star Dust","✨"]],dec:[["ember","Ember","🔥"],["salt","Salt","🧂"],["water","Aetheris Water","💧"]]},ward:{t:"Salt Ward",o:"Create a protective mixture from cleansing and binding signs.",h:"First cleanse, then bind, then seal.",done:"Salt Ward Complete",seq:[["salt","Salt","🧂"],["sage","Sage","🍃"],["silver","Silver Thread","🪙"],["wax","Sealing Wax","🕯️"]],dec:[["berry","Bitter Berry","🫐"],["mushroom","Mushroom","🍄"],["moon","Moonflower","🌙"]]},star:{t:"Star Draught",o:"Complete a longer recipe while ignoring the decoys.",h:"Water wakes the root; root carries flower; flower accepts milk; dust closes the draught.",done:"Star Draught Complete",seq:[["water","Aetheris Water","💧"],["yarrow","Yarrow","🌿"],["moon","Moonflower","🌙"],["milk","Capra Milk","🥛"],["dust","Star Dust","✨"]],dec:[["ember","Ember","🔥"],["salt","Salt","🧂"],["mushroom","Mushroom","🍄"]]}};
let id="healing",i=0,picked=[],mist=0,q=100,max=3,strict=false,shuf=[];const $=x=>document.getElementById(x), item=a=>({id:a[0],name:a[1],e:a[2]}), rec=()=>R[id];
Object.entries(R).forEach(([k,r])=>$("recipeSelect").insertAdjacentHTML("beforeend",`<option value="${k}">${r.t}</option>`));
function trayItems(){let arr=[...rec().seq,...rec().dec].map(item);if(!shuf.length)return arr;let m=new Map(arr.map(x=>[x.id,x]));return shuf.map(x=>m.get(x)).filter(Boolean)}
function reset(clear=true){i=0;picked=[];mist=0;q=100;if(clear)shuf=[];$("title").textContent=rec().t;$("objective").textContent=rec().o;$("hint").textContent="Hint: "+rec().h;$("cauldronState").textContent="Cauldron waiting";$("cauldronSub").textContent="Add the first ingredient.";slots();tray();msg("The brew is waiting for its first ingredient.","")}
function slots(){$("recipe").innerHTML="";rec().seq.map(item).forEach((it,n)=>{let p=picked[n];let d=document.createElement("div");d.className=`slot ${p?"filled":""} ${n===i?"current":""}`;d.innerHTML=`<b>${n+1}</b><span><span class="emoji">${p?p.e:"?"}</span><small>${p?p.name:"Waiting"}</small></span>`;$("recipe").appendChild(d)})}
function tray(){let used=new Set(picked.map(x=>x.id));$("tray").innerHTML="";trayItems().forEach(it=>{let b=document.createElement("button");b.className="item";b.disabled=used.has(it.id);b.innerHTML=`<span class="emoji">${it.e}</span><small>${it.name}</small>`;b.onclick=()=>pick(it);$("tray").appendChild(b)})}
function pick(it){let exp=item(rec().seq[i]);if(!exp)return;if(it.id===exp.id){picked.push(it);i++;slots();tray();if($("trayMode").value==="shuffle")shuffle(false);if(i>=rec().seq.length){msg(`${rec().done} · Quality ${q}%`,"success");$("status").textContent="Complete";$("cauldronState").textContent=rec().done;$("cauldronSub").textContent=`Final quality: ${q}%`;return}msg(`${it.name} added. Next ingredient required.`,"");$("cauldronState").textContent=`${it.name} added`;$("cauldronSub").textContent=`Next: ${item(rec().seq[i]).name}`;return}mist++;q=Math.max(0,q-(strict?100:25));if(strict||mist>=max||q<=0){msg(`The brew curdled. ${it.name} was not the next ingredient.`,"error");$("status").textContent="Ruined";$("cauldronState").textContent="Brew ruined";$("cauldronSub").textContent="Reset and try again."}else{msg(`${it.name} does not answer the recipe yet. Quality reduced.`,"warn");$("cauldronState").textContent="Brew unstable";$("cauldronSub").textContent=`${max-mist} mistake(s) remaining.`)}tray()}
function msg(t,c){$("progress").textContent=`${i} / ${rec().seq.length}`;$("mistakes").textContent=`${mist} / ${max}`;$("quality").textContent=`${q}%`;$("fill").style.width=q+"%";$("result").className="result "+c;$("result").textContent=t;if(c!=="success"&&c!=="error")$("status").textContent=i||mist?"Brewing":"Ready"}
function answer(){picked=rec().seq.map(item);i=picked.length;q=100;slots();tray();msg(`${rec().done} · Correct order loaded.`,"success");$("status").textContent="Complete";$("cauldronState").textContent=rec().done;$("cauldronSub").textContent="Correct order shown for testing."}
function shuffle(render=true){let a=[...rec().seq,...rec().dec].map(x=>x[0]);for(let n=a.length-1;n>0;n--){let j=Math.floor(Math.random()*(n+1));[a[n],a[j]]=[a[j],a[n]]}shuf=a;if(render)tray()}
$("recipeSelect").onchange=e=>{id=e.target.value;reset(true)};$("resetA").onclick=$("resetB").onclick=()=>reset(true);$("answer").onclick=answer;$("shuffle").onclick=()=>shuffle(true);$("strict").onchange=e=>{strict=e.target.checked;reset(false)};$("max").oninput=e=>{max=+e.target.value;$("maxOut").textContent=max;msg($("result").textContent,$("result").className.replace("result ",""))};reset(true);
</script></body></html>
