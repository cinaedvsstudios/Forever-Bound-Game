<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifex Effect Editor Index2 Clean V0.1.8 UI</title>
  <link rel="stylesheet" href="./v3/styles.css?v=index2-018-ui" />
  <link rel="stylesheet" href="./v3/index2-ui-parity.css?v=018-ui" />
</head>
<body>
  <header class="topbar">
    <section class="brand">
      <div class="brand-mark">✦</div>
      <div>
        <h1>ARTIFEX</h1>
        <p>Visual Effects Editor <span id="version-badge">INDEX2-CLEAN-0.1.8-UI</span></p>
      </div>
    </section>

    <nav class="index2-action-strip" aria-label="Control panel shortcuts">
      <button type="button" class="index2-action-button" data-jump-card="index2-card-assets" title="Jump to assets">🧩</button>
      <button type="button" class="index2-action-button" data-jump-card="index2-card-appearance" title="Jump to appearance">🎨</button>
      <button type="button" class="index2-action-button" data-jump-card="index2-card-dynamics" title="Jump to dynamics">🪄</button>
      <button type="button" class="index2-action-button" data-jump-card="effect-specific-controls-card" title="Jump to effect controls">🚀</button>
      <button type="button" class="index2-action-button" data-jump-card="effect-specific-controls-card" title="Jump to specialised controls">💥</button>
    </nav>

    <nav class="menu-bar" aria-label="Editor menus">
      <div class="menu">
        <button class="menu-button" data-menu="file">File ▾</button>
        <div class="menu-panel" id="menu-file">
          <button id="new-effect-button">New Effect Archetype</button>
          <button id="export-json-button">Export Composition JSON</button>
          <label class="menu-file-label">Import Composition JSON<input id="import-json-input" type="file" accept=".json,application/json" hidden /></label>
          <button id="save-local-button">Save Locally</button>
          <button id="load-local-button">Load Local Effect</button>
          <button id="clear-particles-button">Clear Particles</button>
          <button id="snapshot-button-menu">Snapshot</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-button" data-menu="edit">Edit ▾</button>
        <div class="menu-panel" id="menu-edit">
          <button id="duplicate-layer-button">Duplicate Layer</button>
          <button id="delete-layer-button">Delete Layer</button>
          <button id="center-emitter-button">Center Origin</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-button" data-menu="view">View ▾</button>
        <div class="menu-panel" id="menu-view">
          <button data-workspace-mode="dark">Background: Dark</button>
          <button data-workspace-mode="white">Background: White</button>
          <button id="toggle-grid-button">Toggle Grid</button>
          <button id="toggle-helpers-button">Toggle Guides</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-button primary" data-menu="insert">Insert ▾</button>
        <div class="menu-panel wide" id="menu-insert">
          <section class="insert-section">
            <h3>Base Layer</h3>
            <div id="base-layer-list" class="insert-list"></div>
          </section>
        </div>
      </div>
      <div class="menu">
        <button class="menu-button" data-menu="help">Help ▾</button>
        <div class="menu-panel right" id="menu-help">
          <button id="about-button">About INDEX2-CLEAN-0.1.8-UI</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="app-shell">
    <aside id="left-panel" class="side-panel">
      <section id="index2-card-search" class="card index2-search-card" data-search-card="Search">
        <header><h2>Search Settings</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Search Settings">⬆️</button></header>
        <label>Filter left panel<input id="left-panel-search-input" placeholder="Search settings..." /></label>
        <p id="left-panel-search-count" class="index2-search-count">Showing all sections.</p>
      </section>

      <section id="index2-card-assets" class="card" data-search-card="Effect Archetype Assets archetype id layer name engine type">
        <header><h2>Effect Archetype Assets</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Effect Archetype Assets">⬆️</button></header>
        <label>Archetype ID<input id="archetype-id-input" value="fx_v3_effect_001" /></label>
        <label>Layer Name<input id="layer-name-input" placeholder="Select or add a layer" /></label>
        <label>Engine Type<select id="engine-select"></select></label>
      </section>

      <section id="index2-card-presets" class="card" data-search-card="Quick Edit Presets fire ice good magic dark magic helpers colour appearance dynamics water evil smoke glow burst drift">
        <header><h2>Quick Edit Helpers</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Quick Edit Helpers">⬆️</button></header>
        <div class="button-row">
          <button data-quick-preset="fire">Fire</button>
          <button data-quick-preset="ice">Ice</button>
          <button data-quick-preset="goodMagic">Good Magic</button>
          <button data-quick-preset="darkMagic">Dark Magic</button>
        </div>
      </section>

      <section id="index2-card-appearance" class="card" data-search-card="Effect Layer Appearance colour opacity size glow">
        <header><h2>Effect Layer Appearance</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Effect Layer Appearance">⬆️</button></header>
        <label>Start Colour<input id="color-a-input" type="color" value="#ffcc66" /></label>
        <label>End Colour<input id="color-b-input" type="color" value="#ff6600" /></label>
        <label>Start Opacity<input id="alpha-start-input" type="range" min="0" max="1" step="0.01" value="1" /><output id="alpha-start-output">1</output></label>
        <label>End Opacity<input id="alpha-end-input" type="range" min="0" max="1" step="0.01" value="0" /><output id="alpha-end-output">0</output></label>
        <label>Start Size<input id="size-start-input" type="range" min="1" max="90" step="1" value="20" /><output id="size-start-output">20</output></label>
        <label>End Size<input id="size-end-input" type="range" min="0" max="120" step="1" value="4" /><output id="size-end-output">4</output></label>
        <label>Glow Strength<input id="glow-input" type="range" min="0" max="50" step="1" value="12" /><output id="glow-output">12</output></label>
      </section>

      <section id="index2-card-dynamics" class="card" data-search-card="Effect Layer Dynamics origin density speed gravity direction spread lifetime">
        <header><h2>Effect Layer Dynamics</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Effect Layer Dynamics">⬆️</button></header>
        <label>Origin X<input id="emitter-x-input" type="number" min="0" max="1280" value="640" /></label>
        <label>Origin Y<input id="emitter-y-input" type="number" min="0" max="720" value="450" /></label>
        <label>Density<input id="spawn-rate-input" type="range" min="1" max="80" step="1" value="16" /><output id="spawn-rate-output">16</output></label>
        <label>Speed Min<input id="speed-min-input" type="range" min="0" max="30" step="0.1" value="1.5" /><output id="speed-min-output">1.5</output></label>
        <label>Speed Max<input id="speed-max-input" type="range" min="0" max="30" step="0.1" value="6" /><output id="speed-max-output">6</output></label>
        <label>Gravity Strength<input id="gravity-input" type="range" min="-200" max="200" step="1" value="100" /><output id="gravity-output">100</output></label>
        <label>Direction Angle<input id="angle-input" type="range" min="-180" max="180" step="1" value="-90" /><output id="angle-output">-90</output></label>
        <label>Spread<input id="spread-input" type="range" min="0" max="360" step="1" value="60" /><output id="spread-output">60</output></label>
        <label>Lifetime<input id="lifetime-input" type="range" min="10" max="240" step="1" value="80" /><output id="lifetime-output">80</output></label>
      </section>

      <section id="effect-specific-controls-card" class="card index2-effect-specific-card" data-search-card="Effect Specific Controls engine arc flare distortion shockwave lens gas text font letter spacing wrapping line timing reveal direction density scatter lifetime">
        <header><h2>Effect Specific Controls</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Effect Specific Controls">⬆️</button></header>
        <div id="effect-specific-controls-body">Select a layer to see engine controls.</div>
      </section>
    </aside>

    <div id="side-resizer" class="side-resizer" title="Drag to resize side panel"></div>

    <section class="workspace-column">
      <section id="workspace" class="workspace index2-workspace">
        <div class="index2-workspace-controls index2-playback-controls" aria-label="Preview controls">
          <button id="pause-button" title="Pause or resume">▶️</button>
          <button id="snapshot-button" title="Snapshot">📸</button>
        </div>
        <div class="index2-workspace-controls index2-zoom-controls" aria-label="Zoom controls">
          <button id="zoom-out-button">−</button>
          <span id="zoom-readout">100%</span>
          <button id="zoom-in-button">+</button>
          <button id="zoom-reset-button" title="Reset Zoom">🎯</button>
        </div>
        <span id="status-text" class="index2-stage-status">Ready.</span>
        <canvas id="fx-canvas" width="1280" height="720"></canvas>
        <div id="toast-area" aria-live="polite"></div>
      </section>

      <div id="bottom-resizer" class="bottom-resizer" title="Drag to resize layer panel"></div>
      <section id="bottom-panel" class="bottom-panel"></section>
    </section>
  </main>

  <script type="module" src="./v3/src/index2-clean-controller.js?v=016"></script>
  <script type="module" src="./v3/src/index2-ui-parity.js?v=018-ui"></script>
</body>
</html>
