<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifex Effect Editor INDEX2-SMOKE-ANCHOR-MAP-0.2.21</title>
  <link rel="stylesheet" href="./v3/styles.css?v=029-insert-add" />
  <link rel="stylesheet" href="./v3/panel-restore.css?v=033-proto-control-grid" />
  <link rel="stylesheet" href="./v3/index2-workspace-ui.css?v=026-clean" />
  <link rel="stylesheet" href="./v3/editor-appearance-controls.css?v=026-clean" />
</head>
<body>
  <header class="topbar">
    <section class="brand">
      <div class="brand-mark"><span class="brand-mark-rune">ᚠ</span></div>
      <div>
        <h1>ARTIFEX</h1>
        <p>Visual Effects Editor <span id="version-badge">INDEX2-SMOKE-ANCHOR-MAP-0.2.21</span></p>
      </div>
    </section>
    <div class="topbar-tools">
      <nav class="index2-action-strip" aria-label="Control panel shortcuts">
        <button type="button" class="index2-action-button" data-jump-card="index2-card-assets" title="Jump to assets">🧩</button>
        <button type="button" class="index2-action-button" data-jump-card="index2-card-appearance" title="Jump to appearance">🎨</button>
        <button type="button" class="index2-action-button" data-jump-card="index2-card-dynamics" title="Jump to dynamics">🪄</button>
        <button type="button" class="index2-action-button" data-jump-card="effect-specific-controls-card" title="Jump to effect controls">🚀</button>
        <button type="button" class="index2-action-button" data-jump-card="effect-specific-controls-card" title="Jump to specialised controls">💥</button>
      </nav>
      <nav class="menu-bar" aria-label="Editor menus">
      <div class="menu"><button class="menu-button" data-menu="file">File ▾</button><div class="menu-panel" id="menu-file"><button id="new-effect-button">New Effect Archetype</button><button id="export-json-button">Export Composition JSON</button><label class="menu-file-label">Import Composition JSON<input id="import-json-input" type="file" accept=".json,application/json" hidden /></label><button id="save-local-button">Save Locally</button><button id="load-local-button">Load Local Effect</button><button id="clear-particles-button">Clear Particles</button><button id="snapshot-button-menu">Snapshot</button></div></div>
      <div class="menu"><button class="menu-button" data-menu="edit">Edit ▾</button><div class="menu-panel" id="menu-edit"><button id="duplicate-layer-button">Duplicate Layer</button><button id="delete-layer-button">Delete Layer</button><button id="center-emitter-button">Center Origin</button></div></div>
      <div class="menu"><button class="menu-button" data-menu="view">View ▾</button><div class="menu-panel" id="menu-view"><button data-workspace-mode="dark">Background: Dark</button><button data-workspace-mode="white">Background: White</button><button id="toggle-grid-button">Toggle Grid</button><button id="toggle-helpers-button">Toggle Guides</button></div></div>
      <div class="menu"><button class="menu-button primary" data-menu="insert">Insert ▾</button><div class="menu-panel wide" id="menu-insert"><section class="insert-section"><h3>Base Layer</h3><div id="base-layer-list" class="insert-list"></div></section></div></div>
      <div class="menu"><button class="menu-button" data-menu="help">Help ▾</button><div class="menu-panel right" id="menu-help"><button id="about-button">About INDEX2-SMOKE-ANCHOR-MAP-0.2.21</button></div></div>
      </nav>
    </div>
  </header>
  <main class="app-shell">
    <aside id="left-panel" class="side-panel">
      <section id="index2-card-search" class="card index2-search-card index2-search-sticky" data-search-card="Search"><label class="index2-search-label">Search Settings<input id="left-panel-search-input" placeholder="Search settings..." /></label><p id="left-panel-search-count" class="index2-search-count">Showing all sections.</p></section>
      <section id="index2-card-assets" class="card" data-search-card="Effect Archetype Assets archetype id tags layer name engine type">
        <header><h2>Effect Archetype Assets</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Effect Archetype Assets">⬆️</button></header>
        <label>Archetype ID<input id="archetype-id-input" value="fx_v3_effect_001" /></label>
        <label class="index2-tags-field">Tags<input id="effect-tags-input" placeholder="magic, fire, projectile" /></label>
        <label>Layer Name<input id="layer-name-input" placeholder="Select or add a layer" /></label>
        <label>Engine Type<select id="engine-select"></select></label>
      </section>
      <section id="index2-card-presets" class="card" data-search-card="Quick Edit Helpers fire ice good magic dark magic colour appearance dynamics water evil smoke glow burst drift">
        <header><h2>Quick Edit Helpers</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Quick Edit Helpers">⬆️</button></header>
        <div class="index2-quick-helper-sections"><section class="index2-helper-section"><div class="index2-helper-title"><span></span>Colour Helpers</div><div class="index2-helper-grid"><button type="button" data-helper-preset="colour:fire">Fire</button><button type="button" data-helper-preset="colour:ice">Ice</button><button type="button" data-helper-preset="colour:good-magic">Good Magic</button><button type="button" data-helper-preset="colour:dark-magic">Dark Magic</button><button type="button" data-helper-preset="colour:water">Water</button><button type="button" data-helper-preset="colour:evil">Evil</button></div></section></div>
      </section>
      <section id="effect-specific-controls-card" class="card index2-effect-specific-card" data-search-card="Effect Specific Controls engine arc flare distortion shockwave lens gas text font letter spacing wrapping line timing reveal direction density scatter lifetime all caps uppercase"><header><h2>Effect Specific Controls</h2><button type="button" class="index2-card-collapse" data-card-collapse title="Collapse Effect Specific Controls">⬆️</button></header><div id="effect-specific-controls-body">Select a layer to see engine controls.</div></section>
    </aside>
    <div id="side-resizer" class="side-resizer" title="Drag to resize side panel"></div>
    <section class="workspace-column"><section id="workspace" class="workspace index2-workspace"><div class="index2-workspace-controls index2-playback-controls" aria-label="Preview controls"><button id="pause-button" title="Pause or resume"><span class="index2-paused-icon" aria-hidden="true">▶️</span></button><button id="snapshot-button" title="Snapshot">📸</button></div><div class="index2-workspace-controls index2-zoom-controls" aria-label="Zoom controls"><button id="zoom-out-button">−</button><span id="zoom-readout">100%</span><button id="zoom-in-button">+</button><button id="zoom-reset-button" title="Reset Zoom">🎯</button></div><span id="status-text" class="index2-stage-status">Ready.</span><canvas id="fx-canvas" width="1280" height="720"></canvas><div id="toast-area" aria-live="polite"></div></section><div id="bottom-resizer" class="bottom-resizer" title="Drag to resize layer panel"></div><section id="bottom-panel" class="bottom-panel"></section></section>
  </main>
  <dialog id="appearance-choice-dialog"><form method="dialog"><header class="dialog-header"><h2 id="appearance-choice-title">Choose Shape</h2><button value="close" title="Close chooser">×</button></header><div id="appearance-choice-list" class="appearance-choice-grid"></div></form></dialog>
  <script type="module" src="./v3/src/index2-app.js?v=043-smoke-anchor-map"></script>
</body>
</html>
