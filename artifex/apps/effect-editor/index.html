<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifex Effect Editor - v2.3.1 SPLIT-DEBUG</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f0c0b;
    }
    #artifex-core-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #0f0c0b;
    }
    #artifex-shell-status {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 999999;
      border: 1px solid #382a21;
      border-radius: 999px;
      background: rgba(23, 18, 16, 0.92);
      color: #e2cca7;
      font: 11px system-ui, sans-serif;
      padding: 6px 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.65);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <iframe id="artifex-core-frame" src="./index-core.html" title="Artifex Effect Editor core"></iframe>
  <div id="artifex-shell-status">v2.3.1 SPLIT-DEBUG shell loading…</div>

  <script type="module">
    const frame = document.getElementById('artifex-core-frame');
    const status = document.getElementById('artifex-shell-status');

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.style.color = isError ? '#fb7185' : '#86efac';
      window.setTimeout(() => {
        if (!isError) status.style.opacity = '0.15';
      }, 3500);
    }

    async function installShellBridge() {
      try {
        const frameWindow = frame.contentWindow;
        const frameDocument = frame.contentDocument;
        if (!frameWindow || !frameDocument || !frameDocument.body) {
          throw new Error('Core frame document is not ready.');
        }

        const bootstrap = await import('./src/editor-bootstrap.js');
        await import('./src/editor-debug.js');

        bootstrap.installArtifexModules(frameWindow);

        const versionBadge = [...frameDocument.querySelectorAll('span')]
          .find((node) => node.textContent.trim() === 'v2.3.0 ALPHA');
        if (versionBadge) versionBadge.textContent = 'v2.3.1 SPLIT-DEBUG';

        [...frameDocument.querySelectorAll('*')].forEach((node) => {
          if (node.childNodes.length === 1 && node.textContent && node.textContent.includes('v2.3.0 ALPHA Active Grid')) {
            node.textContent = node.textContent.replace('v2.3.0 ALPHA Active Grid', 'v2.3.1 SPLIT-DEBUG Active Grid');
          }
        });

        const helpMenus = [...frameDocument.querySelectorAll('.dropdown-parent .dropdown-menu')];
        const helpMenu = helpMenus.find((menu) => menu.textContent.includes('Quick Start Guide') || menu.textContent.includes('About Artifex Studio'));
        if (helpMenu && !frameDocument.getElementById('artifex-shell-debug-entry')) {
          const divider = frameDocument.createElement('div');
          divider.className = 'border-t border-artifex-border my-1';
          const button = frameDocument.createElement('button');
          button.id = 'artifex-shell-debug-entry';
          button.className = 'w-full text-left px-4 py-2 text-xs hover:bg-artifex-gray hover:text-white transition text-slate-300 flex items-center gap-2';
          button.innerHTML = '<span>🧪</span> Debug Console';
          button.onclick = (event) => {
            event.stopPropagation();
            frameWindow.openArtifexDebugPanel?.();
          };
          helpMenu.appendChild(divider);
          helpMenu.appendChild(button);
        }

        setStatus('v2.3.1 SPLIT-DEBUG ready');
      } catch (error) {
        console.error(error);
        setStatus('v2.3.1 SPLIT-DEBUG bridge failed', true);
      }
    }

    frame.addEventListener('load', () => {
      setStatus('v2.3.1 SPLIT-DEBUG installing…');
      window.setTimeout(installShellBridge, 300);
    });
  </script>
</body>
</html>
