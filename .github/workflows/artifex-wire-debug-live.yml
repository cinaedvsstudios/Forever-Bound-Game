name: Wire Artifex debug branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/artifex-wire-debug-live.yml

permissions:
  contents: write

jobs:
  patch-debug-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fb-effect-debug-shell
          fetch-depth: 0

      - name: Patch live index
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('artifex/apps/effect-editor/index.html')
          text = p.read_text(encoding='utf-8')
          text = text.replace('v2.3.0 ALPHA stable build.', 'v2.3.1 SPLIT-DEBUG debug-wired build.')
          text = text.replace('v2.3.0 ALPHA Active Grid', 'v2.3.1 SPLIT-DEBUG Active Grid')
          text = text.replace('v2.3.0 ALPHA', 'v2.3.1 SPLIT-DEBUG')
          marker = '<!-- Artifex split-step 1 debug module wiring -->'
          script = '''
    <!-- Artifex split-step 1 debug module wiring -->
    <script type="module">
        import { installArtifexModules } from './src/editor-bootstrap.js';
        import './src/editor-debug.js';
        try {
            installArtifexModules(window);
            console.info('Artifex split-step 1 modules loaded: bootstrap + debug.');
        } catch (error) {
            console.error('Artifex split-step 1 module wiring failed.', error);
        }
    </script>
'''
          if marker not in text:
              text = text.replace('\n</body>\n</html>', script + '\n</body>\n</html>')
          p.write_text(text, encoding='utf-8')
          PY

      - name: Commit and push target branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add artifex/apps/effect-editor/index.html
          git commit -m "Wire debug module into Effect Editor index"
          git push origin fb-effect-debug-shell
